<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolleyStatsNL — Volleybalstatistieken</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:#fafafa;color:#111;min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased}

/* ── TOKENS ── */
:root{
  --black:#0a0a0a;--white:#ffffff;
  --gray-50:#f9f9f9;--gray-100:#f2f2f2;--gray-200:#e5e5e5;
  --gray-300:#d4d4d4;--gray-400:#a3a3a3;--gray-500:#737373;
  --gray-700:#404040;--gray-900:#171717;
  --blue:#1a6ef5;--blue-lt:#e8f0fe;
  --green:#16a34a;--green-lt:#dcfce7;
  --red:#dc2626;--red-lt:#fef2f2;
  --yellow:#d97706;--yellow-lt:#fffbeb;
  --gold:#eab308;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',system-ui,sans-serif;
  --radius:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
}

/* ── NAV ── */
nav{background:var(--white);border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:1000}
.nav-inner{height:60px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 24px;gap:24px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0;user-select:none;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--black);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:.95rem;font-weight:700;letter-spacing:-.3px;color:var(--black);line-height:1}
.logo-text span{color:var(--blue)}

/* Search */
.nav-search{max-width:480px;position:relative}
.search-field{display:flex;align-items:center;background:var(--gray-100);border:1px solid transparent;border-radius:var(--radius);transition:border-color .15s,background .15s;overflow:hidden}
.search-field:focus-within{background:var(--white);border-color:var(--gray-300);box-shadow:var(--shadow)}
.search-icon{padding:0 10px 0 14px;color:var(--gray-400);flex-shrink:0;display:flex;align-items:center}
.search-field input{flex:1;border:none;outline:none;background:transparent;padding:9px 4px;font-family:var(--sans);font-size:.9rem;color:var(--black);min-width:0}
.search-field input::placeholder{color:var(--gray-400)}
.search-clear{padding:0 12px;color:var(--gray-400);cursor:pointer;display:none;align-items:center;font-size:18px;line-height:1}
.search-field:focus-within .search-clear{display:flex}

/* Suggest dropdown */
.sugg {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  box-shadow: 0 10px 25px -5px rgba(0,0,0,.1), 0 8px 10px -6px rgba(0,0,0,.1);
  z-index: 500;
  display: none;
  overflow-y: auto;
  max-height: 380px;
}
.sugg.open{display:block}
.sdiv{padding:7px 14px;font-size:.7rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;background:var(--gray-50);border-bottom:1px solid var(--gray-100)}
.si{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--gray-100);transition:background .1s;background:var(--white)}
.si:last-child{border-bottom:none}
.si:hover{background:var(--gray-50)}
.si-ico{font-size:15px;flex-shrink:0}
.si-name{font-size:.88rem;font-weight:500;color:var(--black)}
.si-meta{font-size:.76rem;color:var(--gray-400);font-family:var(--mono)}
.si-tag{margin-left:auto;font-size:.68rem;background:var(--blue-lt);color:var(--blue);border-radius:20px;padding:2px 8px;font-weight:600;flex-shrink:0;font-family:var(--mono)}
.si-tag.saved{background:var(--green-lt);color:var(--green)}

/* Favorites dropdown */
.nav-right{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.fav-wrap{position:relative}
.fav-btn{background:none;border:1px solid var(--gray-200);border-radius:var(--radius);color:var(--gray-700);font-family:var(--sans);font-size:.84rem;font-weight:500;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color .15s,background .15s;white-space:nowrap}
.fav-btn:hover{border-color:var(--gray-300);background:var(--gray-50)}
.fav-btn .fav-count{background:var(--gold);color:#fff;border-radius:10px;padding:1px 7px;font-size:.7rem;font-weight:700;font-family:var(--mono);min-width:18px;text-align:center}
.fav-dd{position:absolute;top:calc(100% + 6px);right:0;width:320px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-md);z-index:600;display:none;max-height:420px;overflow-y:auto}
.fav-dd.open{display:block}
.fav-dd-head{padding:10px 14px;font-size:.7rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;background:var(--gray-50);border-bottom:1px solid var(--gray-100)}
.fav-item{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--gray-100);transition:background .1s}
.fav-item:last-child{border-bottom:none}
.fav-item:hover{background:var(--gray-50)}
.fav-item-ico{font-size:15px;flex-shrink:0;color:var(--gold)}
.fav-item-info{flex:1;min-width:0}
.fav-item-name{font-size:.86rem;font-weight:600;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-item-meta{font-size:.72rem;color:var(--gray-400);font-family:var(--mono)}
.fav-item-rm{background:none;border:none;color:var(--gray-300);font-size:1rem;cursor:pointer;padding:2px 6px;flex-shrink:0;transition:color .15s}
.fav-item-rm:hover{color:var(--red)}
.fav-empty{padding:20px;text-align:center;color:var(--gray-400);font-size:.83rem}

/* ── MAIN ── */
main{max-width:1180px;margin:0 auto;padding:36px 24px 80px}

/* ── HOME ── */
.home-hero{text-align:center;padding:48px 0 36px;position:relative;z-index:100}
.home-hero h2{font-size:2.1rem;font-weight:700;letter-spacing:-.6px;line-height:1.2;margin-bottom:12px;color:var(--black)}
.home-hero p{font-size:1rem;color:var(--gray-500);max-width:460px;margin:0 auto 30px;line-height:1.6}

/* Grote zoekbalk op homepage */
.search-big{
  max-width:560px;
  margin:0 auto;
  display:flex;
  background:var(--white);
  border:1px solid var(--gray-200);
  border-radius:12px;
  box-shadow:var(--shadow-md);
  overflow:visible;
  position:relative;
  isolation:isolate;
}
.search-big input{flex:1;border:none;outline:none;padding:14px 18px;font-family:var(--sans);font-size:.95rem;color:var(--black);background:transparent;min-width:0;border-radius:12px 0 0 12px}
.search-big input::placeholder{color:var(--gray-400)}
.search-big button{background:var(--black);border:none;color:var(--white);font-family:var(--sans);font-size:.88rem;font-weight:600;padding:0 22px;cursor:pointer;flex-shrink:0;transition:opacity .15s;border-radius:0 12px 12px 0}
.search-big button:hover{opacity:.85}
.search-big .sugg{top:calc(100% + 8px)}

/* Saved verenigingen / Favorites */
.saved-section{margin-top:42px;max-width:760px;margin-left:auto;margin-right:auto;isolation:isolate}
.saved-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--gray-400);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.saved-label::after{content:'';flex:1;height:1px;background:var(--gray-200)}
.assoc-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.assoc-tile{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;align-items:center;gap:12px;user-select:none;position:relative;isolation:isolate}
.assoc-tile:hover{border-color:var(--gray-300);box-shadow:var(--shadow)}
.assoc-tile-ico{width:36px;height:36px;border-radius:8px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.assoc-tile-info{flex:1;min-width:0}
.assoc-tile-name{font-size:.88rem;font-weight:600;color:var(--black);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.assoc-tile-meta{font-size:.72rem;color:var(--gray-400);font-family:var(--mono);margin-top:2px}
.assoc-tile-rm{background:none;border:none;color:var(--gray-300);font-size:1rem;cursor:pointer;padding:4px 6px;line-height:1;flex-shrink:0;transition:color .15s}
.assoc-tile-rm:hover{color:var(--red)}

/* Compare additions */
.cmp-cb { width: 18px; height: 18px; cursor: pointer; accent-color: var(--black); }
.compare-table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--gray-200); }
.compare-table th, .compare-table td { padding: 12px 16px; text-align: center; border-bottom: 1px solid var(--gray-100); font-size: .88rem; }
.compare-table th { background: var(--gray-50); font-weight: 600; font-size: .82rem; color: var(--gray-700); text-transform: uppercase; letter-spacing: .5px; }
.compare-table td:first-child, .compare-table th:first-child { text-align: left; font-weight: 600; color: var(--black); }
.compare-banner { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }

.no-saved{background:var(--white);border:1px dashed var(--gray-300);border-radius:12px;padding:32px;text-align:center}
.no-saved p{font-size:.88rem;color:var(--gray-500);line-height:1.5;max-width:340px;margin:0 auto}

/* ── VERENIGING PAGE ── */
.assoc-banner{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:18px 22px;display:flex;align-items:center;gap:14px;margin-bottom:18px}
.back-btn{background:none;border:1px solid var(--gray-200);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-500);font-size:1.1rem;transition:border-color .15s,color .15s;flex-shrink:0}
.back-btn:hover{border-color:var(--gray-400);color:var(--black)}
.assoc-banner-ico{width:42px;height:42px;border-radius:10px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.assoc-banner-info{flex:1;min-width:0}
.assoc-banner-info h2{font-size:1.15rem;font-weight:700;letter-spacing:-.3px;color:var(--black)}
.assoc-banner-meta{font-size:.78rem;color:var(--gray-400);margin-top:2px;font-family:var(--mono)}
.assoc-actions{display:flex;gap:8px;flex-shrink:0}
.btn-save{background:var(--black);border:1px solid var(--black);border-radius:8px;color:var(--white);font-family:var(--sans);font-size:.82rem;font-weight:600;padding:7px 14px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-save:hover{opacity:.85}
.btn-save.saved{background:var(--green-lt);border-color:var(--green);color:var(--green)}
.btn-refresh{background:none;border:1px solid var(--gray-200);border-radius:8px;padding:7px 12px;font-size:.78rem;font-weight:500;color:var(--gray-500);cursor:pointer;font-family:var(--sans);transition:border-color .15s,color .15s;white-space:nowrap}
.btn-refresh:hover{border-color:var(--gray-400);color:var(--black)}
.badge-loading{background:var(--gray-100);color:var(--gray-500);border-radius:20px;padding:5px 12px;font-size:.76rem;font-weight:500;display:flex;align-items:center;gap:6px;flex-shrink:0;font-family:var(--mono)}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.assoc-grid{display:grid;grid-template-columns:280px 1fr 280px;gap:16px;align-items:start}
.assoc-col{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;overflow:hidden}
.assoc-col-head{padding:14px 16px;border-bottom:1px solid var(--gray-200);background:var(--gray-50);display:flex;align-items:center;justify-content:space-between}
.assoc-col-head h3{font-size:.88rem;font-weight:700;letter-spacing:-.2px;color:var(--black)}
.assoc-col-head .ach-count{font-size:.72rem;color:var(--gray-400);font-family:var(--mono)}

/* Teams list (left col) */
.team-li{padding:11px 14px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s}
.team-li:last-child{border-bottom:none}
.team-li:hover{background:var(--gray-50)}
.team-li-info{flex:1;min-width:0}
.team-li-name{font-size:.85rem;font-weight:600;color:var(--black);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-li-meta{font-size:.7rem;color:var(--gray-400);font-family:var(--mono);margin-top:1px}
.fav-star{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--gray-300);padding:2px 4px;flex-shrink:0;transition:color .15s,transform .1s;line-height:1}
.fav-star:hover{color:var(--gold);transform:scale(1.15)}
.fav-star.on{color:var(--gold)}

/* Stats (right col) */
.stat-blk{padding:14px 16px;border-bottom:1px solid var(--gray-100)}
.stat-blk:last-child{border-bottom:none}
.stat-blk-l{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin-bottom:4px;font-family:var(--mono)}
.stat-blk-v{font-size:1.5rem;font-weight:700;letter-spacing:-.6px;line-height:1;color:var(--black)}
.stat-blk-s{font-size:.72rem;color:var(--gray-400);margin-top:3px}
.stat-blk-v.green{color:var(--green)}
.stat-blk-v.red{color:var(--red)}
.stat-blk-v.blue{color:var(--blue)}
.stat-row-2{display:grid;grid-template-columns:1fr 1fr;gap:0}
.stat-row-2 .stat-blk{border-bottom:1px solid var(--gray-100)}
.stat-row-2 .stat-blk:first-child{border-right:1px solid var(--gray-100)}

.no-data{padding:24px;text-align:center;color:var(--gray-400);font-size:.84rem;font-family:var(--mono)}

/* ── TEAM PAGE & TABLES ── */
.team-banner{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:20px}
.banner-ico{width:40px;height:40px;border-radius:10px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.banner-info{flex:1;min-width:0}
.banner-info h2{font-size:1.1rem;font-weight:700;letter-spacing:-.3px;color:var(--black)}
.banner-meta{font-size:.76rem;color:var(--gray-400);margin-top:2px;font-family:var(--mono)}
.banner-meta b{color:var(--blue)}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
.sc{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px}
.sc .l{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin-bottom:6px;font-family:var(--mono)}
.sc .v{font-size:1.65rem;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--black)}
.sc .s{font-size:.72rem;color:var(--gray-400);margin-top:4px}
.sc.c-blue .v{color:var(--blue)}
.sc.c-green .v{color:var(--green)}
.sc.c-red .v{color:var(--red)}

.tabs-wrap{border-bottom:1px solid var(--gray-200);margin-bottom:18px}
.tabs{display:flex;gap:0}
.tab{background:none;border:none;padding:10px 18px;font-family:var(--sans);font-size:.88rem;font-weight:500;color:var(--gray-400);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:color .15s}
.tab:hover{color:var(--gray-700)}
.tab.on{color:var(--black);border-bottom-color:var(--black);font-weight:600}
.pane{display:none}.pane.on{display:block}

.tcard{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.tcard table{width:100%;border-collapse:collapse}
.tcard thead tr{background:var(--gray-50)}
.tcard th{padding:9px 14px;font-size:.68rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--gray-200);font-family:var(--mono)}
.tcard td{padding:10px 14px;border-bottom:1px solid var(--gray-100);vertical-align:middle;font-size:.88rem;color:var(--black)}
.tcard tr:last-child td{border-bottom:none}
.tcard tr:hover td{background:var(--gray-50)}
.score{font-weight:700;font-family:var(--mono)}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:.72rem;font-weight:600;font-family:var(--mono)}
.bW{background:var(--green-lt);color:var(--green)}
.bL{background:var(--red-lt);color:var(--red)}
.bP{background:var(--gray-100);color:var(--gray-400)}
.lh{background:var(--blue-lt);color:var(--blue);padding:2px 8px;border-radius:5px;font-size:.68rem;font-weight:600;font-family:var(--mono)}
.la{background:var(--yellow-lt);color:var(--yellow);padding:2px 8px;border-radius:5px;font-size:.68rem;font-weight:600;font-family:var(--mono)}
.pts-val{font-weight:700;font-family:var(--mono)}
.pts-3{color:var(--green)}.pts-2{color:#65a30d}.pts-1{color:var(--yellow)}.pts-0{color:var(--red)}

.form-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.fd{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;font-family:var(--mono)}
.fd.W{background:var(--green);color:#fff}
.fd.L{background:var(--red);color:#fff}
.fd.P{background:var(--gray-200);color:var(--gray-400)}
.form-lbl{font-size:.72rem;color:var(--gray-400);margin-left:4px;font-family:var(--mono)}

.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.cc{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:18px}
.cc h3{font-size:.9rem;font-weight:700;color:var(--black);margin-bottom:2px;letter-spacing:-.2px}
.cc .cs{font-size:.76rem;color:var(--gray-400);margin-bottom:14px;line-height:1.4}
.cc canvas{max-height:185px}

.ins-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:16px}
.ins{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px 16px;display:flex;gap:12px}
.ins-i{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.ins h4{font-size:.84rem;font-weight:700;color:var(--black);margin-bottom:3px;letter-spacing:-.2px}
.ins p{font-size:.77rem;color:var(--gray-500);line-height:1.55}
.ins.pos{border-left:3px solid var(--green)}
.ins.neg{border-left:3px solid var(--red)}
.ins.neu{border-left:3px solid var(--blue)}
.ins.warn{border-left:3px solid var(--yellow)}

.sl{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--gray-400);margin-bottom:10px;margin-top:2px;font-family:var(--mono)}
.err{background:var(--red-lt);border:1px solid #fca5a5;border-radius:var(--radius);padding:14px 16px;color:#991b1b;font-size:.86rem;text-align:center}
.info-box{background:var(--blue-lt);border:1px solid #93c5fd;border-radius:var(--radius);padding:12px 16px;color:#1e40af;font-size:.83rem;margin-bottom:14px;line-height:1.5}
.nd{text-align:center;padding:28px;color:var(--gray-400);font-size:.86rem;font-family:var(--mono)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease both}

/* ── KAMPIOEN BANNER ── */
.champion-banner{
  background:linear-gradient(135deg,#fef9c3 0%,#fef08a 40%,#fde68a 100%);
  border:2px solid var(--gold);
  border-radius:12px;
  padding:14px 20px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:14px;
  font-size:.95rem;
  font-weight:600;
  color:#78350f;
  box-shadow:0 4px 16px rgba(234,179,8,.2);
}
.champion-banner .cb-icon{font-size:2rem;flex-shrink:0}
.champion-banner .cb-body{flex:1}

<script>
// ═══════════════════════════════════════════
//  CONSTANTEN
// ═══════════════════════════════════════════
const NEVOBO    = 'https://api.nevobo.nl';
const EXPORT    = NEVOBO + '/export';
const STORE_ASSOCS = 'vs_assocs_saved_v2';
const STORE_FAVS   = 'vs_fav_teams_v1';
const CPFX      = 'vs_c4_';
const SEASON_PFX = 'vs_season_';   // prefix voor seizoensarchief per team
const TTL       = 3600000; // 1 uur
const TTL_SEASON = 365 * 24 * 3600000; // 1 jaar voor afgesloten seizoenen

// Detecteer huidig volleybalseizoen (start augustus)
function currentSeason() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth(); // 0=jan
  return m >= 7 ? `${y}-${y+1}` : `${y-1}-${y}`;
}

// Sla seizoen-snapshot op in localStorage (wordt bewaard ook na seizoenswissel)
function saveSeasonSnapshot(teamId, season, matches) {
  const key = SEASON_PFX + teamId + '__' + season;
  try {
    localStorage.setItem(key, JSON.stringify({ ts: Date.now(), season, matches }));
  } catch(e) {}
}

function getSeasonSnapshot(teamId, season) {
  const key = SEASON_PFX + teamId + '__' + season;
  try {
    const r = localStorage.getItem(key);
    return r ? JSON.parse(r) : null;
  } catch { return null; }
}

function listSeasonSnapshots(teamId) {
  const prefix = SEASON_PFX + teamId + '__';
  const results = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) {
        const data = JSON.parse(localStorage.getItem(k));
        if (data) results.push(data);
      }
    }
  } catch {}
  return results.sort((a, b) => b.season.localeCompare(a.season));
}

/// Proxy: eigen backend (/api/rss) als we via Flask draaien, anders CORS-fallbacks
const _hasBackend = location.port === '5000' ||
  (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1' && location.protocol !== 'file:');
const PROXY_CHAIN = _hasBackend
  ? [{ url: u => '/api/rss?url=' + encodeURIComponent(u), raw: true }]
  : [
      { url: u => 'https://corsproxy.io/?' + encodeURIComponent(u), raw: true },
      { url: u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u), raw: false },
    ];

// Generatie-counter
let gen = 0;
const CLUBS = {};
let clubsLoaded = false;
const TR = {};
let charts = {};

// In-memory page cache: slaat de volledige gerenderde staat op zodat
// terugnavigatie binnen een sessie instant gaat (geen netwerkverzoeken).
// Structuur: { assoc: { [code]: { teams, allItems, html } }, team: { [id]: { matches, html } } }
const PAGE_CACHE = { assoc: {}, team: {} };

// ═══════════════════════════════════════════
//  OPSLAG
// ═══════════════════════════════════════════
function getSavedAssocs() { try { return JSON.parse(localStorage.getItem(STORE_ASSOCS)) || []; } catch { return []; } }
function saveSavedAssocs(arr) { try { localStorage.setItem(STORE_ASSOCS, JSON.stringify(arr)); } catch {} }
function isAssocSaved(code) { return getSavedAssocs().some(a => a.code === code.toUpperCase()); }
function toggleSavedAssoc(code, name) {
  const C = code.toUpperCase();
  let saved = getSavedAssocs();
  if (saved.some(a => a.code === C)) saved = saved.filter(a => a.code !== C);
  else saved.push({ code: C, name });
  saveSavedAssocs(saved);
  return saved.some(a => a.code === C);
}
function removeSavedAssoc(code) { saveSavedAssocs(getSavedAssocs().filter(a => a.code !== code.toUpperCase())); }

function getFavTeams() { try { return JSON.parse(localStorage.getItem(STORE_FAVS)) || []; } catch { return []; } }
function saveFavTeams(arr) { try { localStorage.setItem(STORE_FAVS, JSON.stringify(arr)); } catch {} }
function isFavTeam(id) { return getFavTeams().some(t => t.id === id); }
function toggleFavTeam(team) {
  let favs = getFavTeams();
  if (favs.some(t => t.id === team.id)) favs = favs.filter(t => t.id !== team.id);
  else { favs.push(team); TR[team.id] = team; }
  saveFavTeams(favs);
  updateFavCount();
  return favs.some(t => t.id === team.id);
}
function removeFavTeam(id) { saveFavTeams(getFavTeams().filter(t => t.id !== id)); updateFavCount(); }

function getCached(k) {
  try {
    const r = localStorage.getItem(CPFX+k);
    if (!r) return null;
    const {ts,d} = JSON.parse(r);
    if (Date.now()-ts > TTL) { localStorage.removeItem(CPFX+k); return null; }
    return d;
  } catch { return null; }
}
function setCached(k,d) { try { localStorage.setItem(CPFX+k, JSON.stringify({ts:Date.now(),d})); } catch {} }
function delCached(k) { try { localStorage.removeItem(CPFX+k); } catch {} }

// ═══════════════════════════════════════════
//  CLUBS DATABASE LOADER
// ═══════════════════════════════════════════
async function loadClubsDB() {
  const paths = ['nevobo_clubs.json', 'Scraper/nevobo_clubs.json'];
  for (const p of paths) {
    try {
      const r = await fetch(p);
      if (!r.ok) continue;
      const data = await r.json();
      if (Array.isArray(data)) {
        data.forEach(c => { if (c.code && c.name) CLUBS[c.code.toUpperCase()] = { code: c.code.toUpperCase(), name: c.name }; });
        clubsLoaded = true;
        return;
      }
    } catch(e) {}
  }
}

// ═══════════════════════════════════════════
//  URL-BUILDER
// ═══════════════════════════════════════════
function teamUrl(code,type,nr)      { return EXPORT+'/team/'+code.toUpperCase()+'/'+type+'/'+nr+'/resultaten.rss'; }
function programmaUrl(code,type,nr) { return EXPORT+'/team/'+code.toUpperCase()+'/'+type+'/'+nr+'/programma.rss'; }
function verUrl(code)               { return EXPORT+'/vereniging/'+code.toUpperCase()+'/resultaten.rss'; }
function standUrl(path)             { return EXPORT+'/poule/'+path+'/stand.rss'; }
function cacheKey(code,type,nr)     { return code.toUpperCase()+'__'+type+'__'+nr; }
function teamId(code,type,nr)       { return (code+'_'+type+'_'+nr).toLowerCase().replace(/[^a-z0-9_]/g,'_'); }

// Bekende Nevobo regio-waarden (volgorde: langste eerst om greedy matching te vermijden)
const NEVOBO_REGIOS = [
  'nationale-competitie', 'kampioenschappen',
  'regio-noord', 'regio-oost', 'regio-zuid', 'regio-west'
];

// Extraheer regio + poule-code uit een Nevobo of volleybal.nl URL.
// bv. https://www.volleybal.nl/.../nationale-competitie-2dh-11 → { regio:'nationale-competitie', poule:'2dh' }
// Extraheer het volledige poule-pad (3 segmenten) uit een Nevobo- of volleybal.nl-URL.
// Resultaat: { path: 'regio/competition-slug/poule-slug' } of null
// bv. 'https://api.nevobo.nl/export/poule/nationale-competitie/competitie-seniorencompetitie-5/nationale-competitie-2dh-11/stand.rss'
//   → { path: 'nationale-competitie/competitie-seniorencompetitie-5/nationale-competitie-2dh-11' }
// bv. 'https://www.volleybal.nl/competitie/poule/nationale-competitie/competitie-seniorencompetitie-5/nationale-competitie-2dh-11'
//   → { path: 'nationale-competitie/competitie-seniorencompetitie-5/nationale-competitie-2dh-11' }
function pouleFromLink(link) {
  if (!link) return null;
  const SEG = '[a-z][a-z0-9-]*'; // URL-segment (begint met letter)

  // Patroon 1: api.nevobo.nl/export/poule/{regio}/{comp}/{poule}/...
  let m = link.match(new RegExp('/export/poule/((' + SEG + ')/(' + SEG + ')/(' + SEG + '))/'));
  if (m && NEVOBO_REGIOS.includes(m[2])) return { path: m[1] };

  // Patroon 2: volleybal.nl/competitie/{type}/{regio}/{comp}/{poule}
  m = link.match(new RegExp('/competitie/[a-z]+/((' + SEG + ')/(' + SEG + ')/(' + SEG + '))(?:[/?#]|$)'));
  if (m && NEVOBO_REGIOS.includes(m[2])) return { path: m[1] };

  // Patroon 3: api.nevobo.nl/export/poule/{regio}/{poule}/... (2-segment, oud formaat)
  m = link.match(new RegExp('/export/poule/((' + SEG + ')/(' + SEG + '))/'));
  if (m && NEVOBO_REGIOS.includes(m[2])) return { path: m[1] };

  return null;
}

// Parse stand-RSS. Het Nevobo-formaat is niet gedocumenteerd, dus we proberen meerdere patronen.
function parseStand(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  if (doc.querySelector('parsererror')) return [];
  const rows = [];

  // Helper: extraheer één rij uit een stuk tekst
  function tryExtract(text) {
    if (!text) return;
    const clean = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
    // Formaat A: "1. Teamnaam, wedstr: 14, punten: 38"  (komma-gescheiden)
    const reA = /(\d+)\.\s+(.+?),\s*wedstr(?:ijden)?:\s*(\d+),\s*punten:\s*(\d+)/gi;
    // Formaat B: "1. Teamnaam | 14 | 38 punten"
    const reB = /(\d+)\.\s+(.+?)\s*\|\s*(\d+)\s*\|\s*(\d+)/g;
    // Formaat C: "1 Teamnaam 14 38" (tabel-achtig, whitespace-gescheiden)
    const reC = /^(\d+)\s+(.+?)\s+(\d+)\s+(\d+)\s*$/mg;
    // Formaat D: "<td>1</td><td>Teamnaam</td>...<td>38</td>" (HTML in CDATA)
    // → al afgevangen door clean (HTML verwijderd)
    let m;
    for (const re of [reA, reB, reC]) {
      re.lastIndex = 0;
      while ((m = re.exec(clean)) !== null) {
        const pos = +m[1], name = m[2].trim(), wedstr = +m[3], punten = +m[4];
        if (pos > 0 && name && !rows.find(r => r.pos === pos)) {
          rows.push({ pos, name, wedstr, punten });
        }
      }
      if (rows.length) return;
    }
  }

  // Strategie 1: één item per team (meest waarschijnlijk)
  doc.querySelectorAll('item').forEach(item => {
    const title = item.querySelector('title')?.textContent || '';
    const desc  = item.querySelector('description')?.textContent || '';
    // Titel-formaat: "1. De Boemel HS 1" + desc voor stats → combineer
    tryExtract(title + ' ' + desc);
  });

  // Strategie 2: alle data in één description-blok
  if (!rows.length) {
    const allText = [...doc.querySelectorAll('item description')].map(d => d.textContent).join('\n');
    tryExtract(allText);
  }

  // Strategie 3: channel description
  if (!rows.length) {
    const chanDesc = doc.querySelector('channel > description')?.textContent || '';
    tryExtract(chanDesc);
  }

  return rows.sort((a,b) => a.pos - b.pos);
}

// ═══════════════════════════════════════════
//  FETCH & PARSE RSS
// ═══════════════════════════════════════════
async function fetchRSS(url) {
  for (const proxy of PROXY_CHAIN) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 10000);
    try {
      const r = await fetch(proxy.url(url), {signal: ctrl.signal});
      clearTimeout(t);
      if (!r.ok) throw new Error('HTTP '+r.status);
      if (proxy.raw) {
        const text = await r.text();
        if (!text || text.length < 50) throw new Error('Lege response');
        return text;
      } else {
        const j = await r.json();
        if (!j.contents) throw new Error('Lege proxy response');
        return j.contents;
      }
    } catch(e) { clearTimeout(t); }
  }
  throw new Error('Kon RSS niet inladen.');
}

function parseRSS(xml) {
  const doc = new DOMParser().parseFromString(xml,'text/xml');
  if (doc.querySelector('parsererror')) throw new Error('Ongeldige RSS');
  return [...doc.querySelectorAll('item')].map(parseItem);
}

// Extraheer channel-level metadata (link + title) uit een RSS
function parseRSSChannelMeta(xml) {
  const result = { link: '', title: '' };
  try {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    if (doc.querySelector('parseerror')) return result;
    const channel = doc.querySelector('channel');
    if (!channel) return result;
    for (const node of channel.childNodes) {
      if (node.nodeName === 'link')  result.link  = (node.textContent || '').trim();
      if (node.nodeName === 'title') result.title = (node.textContent || '').trim();
    }
  } catch {}
  return result;
}

// Sleutelwoorden in channel-title → poule-URL params
// Poule-code patroon (nationaal): {volgnr}{divisieletter}{geslacht} → bv. 2dh = Tweede Divisie D Heren
// Formaat: [ zoekterm (lowercase), regio, poule ]
const TITLE_TO_POULE = [
  // ── Heren nationaal ──
  ['heren eredivisie',       'nationale-competitie', '1h'],   // Eredivisie Heren = 1h (aanname)
  ['heren 1e divisie',       'nationale-competitie', '1h'],
  ['heren eerste divisie',   'nationale-competitie', '1h'],
  ['heren 2e divisie a',     'nationale-competitie', '2ah'],
  ['heren tweede divisie a', 'nationale-competitie', '2ah'],
  ['heren 2e divisie b',     'nationale-competitie', '2bh'],
  ['heren tweede divisie b', 'nationale-competitie', '2bh'],
  ['heren 2e divisie c',     'nationale-competitie', '2ch'],
  ['heren tweede divisie c', 'nationale-competitie', '2ch'],
  ['heren 2e divisie d',     'nationale-competitie', '2dh'],  // ✓ bevestigd
  ['heren tweede divisie d', 'nationale-competitie', '2dh'],  // ✓ bevestigd
  ['heren 2e divisie e',     'nationale-competitie', '2eh'],
  ['heren tweede divisie e', 'nationale-competitie', '2eh'],
  ['heren 2e divisie f',     'nationale-competitie', '2fh'],
  ['heren tweede divisie f', 'nationale-competitie', '2fh'],
  ['heren 3e divisie',       'nationale-competitie', '3h'],
  ['heren derde divisie',    'nationale-competitie', '3h'],
  // ── Dames nationaal ──
  ['dames eredivisie',       'nationale-competitie', '1d'],
  ['dames 1e divisie',       'nationale-competitie', '1d'],
  ['dames eerste divisie',   'nationale-competitie', '1d'],
  ['dames 2e divisie a',     'nationale-competitie', '2ad'],
  ['dames tweede divisie a', 'nationale-competitie', '2ad'],
  ['dames 2e divisie b',     'nationale-competitie', '2bd'],
  ['dames tweede divisie b', 'nationale-competitie', '2bd'],
  ['dames 2e divisie c',     'nationale-competitie', '2cd'],
  ['dames tweede divisie c', 'nationale-competitie', '2cd'],
  ['dames 2e divisie d',     'nationale-competitie', '2dd'],
  ['dames tweede divisie d', 'nationale-competitie', '2dd'],
  ['dames 2e divisie e',     'nationale-competitie', '2ed'],
  ['dames tweede divisie e', 'nationale-competitie', '2ed'],
  ['dames 3e divisie',       'nationale-competitie', '3d'],
  ['dames derde divisie',    'nationale-competitie', '3d'],
  // Regio-competities: uitbreiden zodra channel-titles bekend zijn
];

// ── Dynamische poule-database (gegenereerd door scraper_poules.py) ──────────
// Wordt asynchroon geladen vanuit poule_db.json (naast index.html op GitHub).
// Formaat: [{ path, title, teams }]
// Zolang leeg valt de code terug op TITLE_TO_POULE en pouleFromLink.
let POULE_DB = [];

// Zoek in POULE_DB de juiste poule voor een team.
//
// Pass 1 – Teamnaam-match (werkt voor entries met echte teamnamen):
//   "De Boemel HS 2" → zoek entry waar een team "de boemel hs 2" bevat.
//   Clubwoorden min 2 tekens (zodat "VC", "ODS" etc ook matchen).
//
// Pass 2 – channelTitle-normalisatie (fallback voor Stand-only entries):
//   Normaliseer RSS channel title ("Competitie Heren 3e Klasse A Regio Noord")
//   en vergelijk met genormaliseerde Stand-titel ("Heren 3e Klasse A Regio Noord").
//   Bij exact 1 match → gebruik die poule.

function _normTitle(s) {
  if (!s) return '';
  s = s.toLowerCase();
  for (const p of ['rss feed ', 'stand ', 'competitie ', 'wedstrijdprogramma ']) {
    if (s.startsWith(p)) { s = s.slice(p.length); break; }
  }
  s = s.replace(/\s+\d+e\s+ronde\b/g, '');  // strip "12e ronde"
  s = s.replace(/\bpoule\s+\d+\b/g, '');     // strip "poule 4"
  s = s.replace(/\s+\d+\s*$/, '');            // strip trailing getal
  return s.trim();
}

// Normalisatie-cache (herbouw als POULE_DB verandert)
let _POULE_DB_NORM = null;
function _getPouleNorm() {
  if (_POULE_DB_NORM && _POULE_DB_NORM.length === POULE_DB.length) return _POULE_DB_NORM;
  _POULE_DB_NORM = POULE_DB.map(e => ({ e, n: _normTitle((e.teams && e.teams[0]) || '') }));
  return _POULE_DB_NORM;
}

function pouleFromDB(channelTitle, teamName) {
  if (!POULE_DB.length) return null;

  // ── Pass 1: teamnaam-match ──
  const tn = (teamName || '').toLowerCase().trim();
  if (tn) {
    const m = tn.match(/\b(hs|ds|mc|ms|ja|jb|ma|mb|da|db|n\d+|u\d+)\s+(\d+)\s*$/i);
    if (m) {
      const typeNr    = m[1].toLowerCase() + ' ' + m[2];
      const clubBase  = tn.slice(0, m.index).trim();
      const clubWords = clubBase.split(/\W+/).filter(w => w.length >= 2);
      if (clubWords.length) {
        for (const entry of POULE_DB) {
          const teams = (entry.teams || []).map(t => t.toLowerCase().replace(/^\d+\.\s*/, ''));
          if (teams.length > 1 || (teams[0] && !teams[0].startsWith('stand '))) {
            if (teams.some(t => t.includes(typeNr) && clubWords.some(w => t.includes(w)))) {
              console.log('[pouleFromDB] Pass1:', entry.path);
              return { path: entry.path };
            }
          }
        }
      }
    }
  }

  // ── Pass 2: channelTitle-normalisatie (voor Stand-only entries) ──
  if (channelTitle) {
    const normInput = _normTitle(channelTitle);
    if (normInput) {
      const hits = _getPouleNorm().filter(x => x.n === normInput);
      if (hits.length === 1) {
        console.log('[pouleFromDB] Pass2 exact:', hits[0].e.path);
        return { path: hits[0].e.path };
      }
    }
  }

  return null;
}

function pouleFromTitle(title) {
  if (!title) return null;
  const tl = title.toLowerCase();
  for (const [keyword, regio, poule] of TITLE_TO_POULE) {
    // Geeft een 2-segment pad terug (regio/poule); werkt alleen als de API
    // ook de verkorte URL ondersteunt (zonder competition-slug).
    if (tl.includes(keyword)) return { path: regio + '/' + poule };
  }
  return null;
}

// Handmatige poule-config per team (localStorage)
// Nieuw formaat: { path: 'regio/competition/poule' }
// Oud formaat (backwards compat): { regio, poule } → wordt omgezet naar { path: regio+'/'+poule }
const POULE_CFG_PFX = 'vs_poule_cfg__';
function getPouleConfig(teamId) {
  try {
    const raw = JSON.parse(localStorage.getItem(POULE_CFG_PFX + teamId));
    if (!raw) return null;
    if (raw.path) return raw;                        // nieuw formaat
    if (raw.regio && raw.poule) return { path: raw.regio + '/' + raw.poule }; // migreer oud formaat
    return null;
  } catch { return null; }
}
function setPouleConfig(teamId, path) {
  try { localStorage.setItem(POULE_CFG_PFX + teamId, JSON.stringify({ path })); } catch {}
}

function parseItem(item) {
  const title    = (item.querySelector('title')?.textContent||'').trim();
  const desc     = (item.querySelector('description')?.textContent||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  const pubDate  = (item.querySelector('pubDate')?.textContent||'').trim();
  const link     = (item.querySelector('link')?.textContent||'').trim();
  const category = (item.querySelector('category')?.textContent||'').trim().toLowerCase();

  let ts=null, dateStr='—', timeStr='', season=null;
  if (pubDate) {
    const d = new Date(pubDate);
    if (!isNaN(d)) {
      ts = d.getTime();
      dateStr = d.toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
      const h = d.getHours(), m2 = d.getMinutes();
      if (h > 0 || m2 > 0) timeStr = String(h).padStart(2,'0')+':'+String(m2).padStart(2,'0');
      // Volleybalseizoen: aug–jul → bijv. wedstrijd in sep 2025 = seizoen 2025-2026
      const y = d.getFullYear(), mo = d.getMonth();
      season = mo >= 7 ? `${y}-${y+1}` : `${y-1}-${y}`;
    }
  }

  let thuis='', uit='', scoreStr='', sw=0, sl=0;
  const uitslag_idx = title.indexOf(', Uitslag:');
  const teamsPart   = uitslag_idx>=0 ? title.slice(0,uitslag_idx) : title;
  const scorePart   = uitslag_idx>=0 ? title.slice(uitslag_idx+10).trim() : '';

  if (scorePart) {
    const sm = scorePart.match(/^(\d+)\s*-\s*(\d+)/);
    if (sm) { sw=+sm[1]; sl=+sm[2]; scoreStr=sw+'-'+sl; }
  }

  const teamSplit = teamsPart.split(/\s+-\s+/);
  thuis = (teamSplit[0]||'').trim();
  uit   = (teamSplit.slice(1).join(' - ')||'').trim();

  const sets=[];
  const setM = desc.match(/Setstanden:\s*([\d,\s-]+)/i);
  if (setM) {
    const sr = /(\d{1,2})-(\d{1,2})/g; let m;
    while ((m=sr.exec(setM[1]))!==null) {
      const a=+m[1],b=+m[2];
      if (Math.max(a,b)>=10 && Math.max(a,b)<=35) sets.push([a,b]);
    }
  }

  const played_cat = category === 'gespeeld' || (scoreStr !== '');
  let result=null, points=null;
  if (scoreStr) {
    result = sw>sl ? 'W' : 'L';
    points = result==='W' ? (sl<=1?3:2) : (sw===2?1:0);
  }

  return {ts,dateStr,timeStr,season,thuis,uit,scoreStr,sw,sl,sets,result,points,link,played_cat};
}

function enrichHA(matches,teamName) {
  const words = teamName.toLowerCase().split(/\s+/).filter(w=>w.length>2 && !/^\d+$/.test(w));
  return matches.map(m=>{
    const tl = m.thuis.toLowerCase();
    const isHome = words.some(w=>tl.includes(w));
    const opponent = isHome ? m.uit : m.thuis;
    let result = null, points = null;
    if (m.scoreStr) {
      const teamWon = isHome ? m.sw > m.sl : m.sl > m.sw;
      const teamSets = isHome ? m.sw : m.sl;
      const oppSets  = isHome ? m.sl : m.sw;
      result = teamWon ? 'W' : 'L';
      if (teamWon) points = oppSets <= 1 ? 3 : 2;
      else points = teamSets === 2 ? 1 : 0;
    }
    return{...m, isHome, opponent, result, points};
  });
}

function rawTypeToApiType(r) {
  const m={'DS':'dames','HS':'heren','DA':'meisjes-a','MA':'meiden-a','DB':'meisjes-b','MB':'meiden-b','DC':'meisjes-c','MC':'meiden-c','DD':'meisjes-d','MD':'meiden-d','HA':'jongens-a','JA':'jongens-a','HB':'jongens-b','JB':'jongens-b','HC':'jongens-c','JC':'jongens-c','HD':'jongens-d','JD':'jongens-d','GEM':'gemengd','XR':'mix-recreatief','N1':'cmv-niveau-1','N2':'cmv-niveau-2','N3':'cmv-niveau-3','N4':'cmv-niveau-4','L1':'volley-stars-level-1','L2':'volley-stars-level-2','L3':'volley-stars-level-3','L4':'volley-stars-level-4','L5':'volley-stars-level-5'};
  return m[r.toUpperCase()] || r.toLowerCase();
}
function typeLabel(type) {
  const m={'dames':'DS','heren':'HS','meisjes-a':'DA','meiden-a':'MA','meisjes-b':'DB','meiden-b':'MB','meisjes-c':'DC','meiden-c':'MC','meisjes-d':'DD','meiden-d':'MD','jongens-a':'JA','jongens-b':'JB','jongens-c':'JC','jongens-d':'JD','gemengd':'GEM','mix-recreatief':'XR','cmv-niveau-1':'N1','cmv-niveau-2':'N2','cmv-niveau-3':'N3','cmv-niveau-4':'N4','volley-stars-level-1':'L1','volley-stars-level-2':'L2','volley-stars-level-3':'L3','volley-stars-level-4':'L4','volley-stars-level-5':'L5'};
  return m[type] || type;
}
function clubNameFromTeam(name) { return name.replace(/\s+(DS|HS|DA|DB|DC|DD|HA|HB|HC|HD|JA|JB|JC|JD|MA|MB|MC|MD|GEM|XR|N\d|L\d)\s*\d*\s*$/i,'').trim() || name; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function searchClubs(q, limit=12) {
  const ql = q.toLowerCase().trim();
  if (!ql) return [];
  const all = Object.values(CLUBS);
  const exact = all.filter(c => c.code.toLowerCase() === ql);
  if (exact.length) return exact;
  const starts = all.filter(c => c.name.toLowerCase().startsWith(ql));
  const contains = all.filter(c => c.name.toLowerCase().includes(ql) && !c.name.toLowerCase().startsWith(ql));
  const codeMatch = all.filter(c => c.code.toLowerCase().includes(ql) && !c.name.toLowerCase().includes(ql));
  return [...starts, ...contains, ...codeMatch].slice(0, limit);
}

function updateSugg(q, box) {
  if (!clubsLoaded) { box.innerHTML = '<div class="nd" style="padding:14px">⏳ Laden…</div>'; box.classList.add('open'); return; }
  if (q.length < 1) { box.classList.remove('open'); return; }
  const hits = searchClubs(q, 12);
  if (!hits.length) { box.innerHTML = '<div class="nd" style="padding:14px">Geen resultaten</div>'; box.classList.add('open'); return; }
  const showTag = box === SB;
  box.innerHTML = '<div class="sdiv">Verenigingen ('+hits.length+')</div>' + hits.map(c => {
    const saved = showTag && isAssocSaved(c.code);
    return '<div class="si" data-club="'+esc(c.code)+'" data-name="'+esc(c.name)+'"><div class="si-ico">🏟️</div><div style="flex:1;min-width:0"><div class="si-name">'+esc(c.name)+'</div><div class="si-meta">'+esc(c.code)+'</div></div>'+(showTag?'<span class="si-tag'+(saved?' saved':'')+'">'+(saved?'★':c.code)+'</span>':'')+'</div>';

  box.classList.add('open');
}

function doSearch(inputEl, box) {
  const q = inputEl.value.trim();
  if (!q) return;
  const hits = searchClubs(q, 1);
  if (hits.length) { box.classList.remove('open'); showAssocPage(hits[0].code, hits[0].name); }
}

function compareSelected() {
  const cbs = document.querySelectorAll('.cmp-cb:checked');
  if (cbs.length < 2) { alert('Selecteer minimaal 2 teams om te vergelijken.'); return; }
  const ids = Array.from(cbs).map(cb => cb.value);
  showComparePage(ids);
}

async function showComparePage(ids) {
  const M = document.getElementById('M');
  M.innerHTML = '<div class="compare-banner fade-up"><h2>Vergelijk Teams</h2><button class="btn-refresh" data-action="home">← Terug</button></div><div class="nd">⏳ Gegevens ophalen...</div>';

  const results = [];
  for (const id of ids) {
    const team = TR[id] || getFavTeams().find(t=>t.id===id);
    if (!team) continue;
    const key = cacheKey(team.code, team.type, team.nr);
    let allMatches = getCached(key);
    if (!allMatches) {
        try {
            const [resXml, prgXml] = await Promise.allSettled([ fetchRSS(teamUrl(team.code, team.type, team.nr)), fetchRSS(programmaUrl(team.code, team.type, team.nr)) ]);
            const played = resXml.status === 'fulfilled' ? parseRSS(resXml.value) : [];
            const planned = prgXml.status === 'fulfilled' ? parseRSS(prgXml.value) : [];
            const playedTs = new Set(played.filter(m=>m.ts).map(m=>m.ts));
            const futurePlanned = planned.filter(m => m.ts && !playedTs.has(m.ts));
            allMatches = [...played, ...futurePlanned];
            setCached(key, allMatches);
        } catch(e) { continue; }
    }
    const enriched = enrichHA(allMatches, team.name);
    const played = enriched.filter(m=>m.result!==null);
    const wins = played.filter(m=>m.result==='W').length;
    const losses = played.filter(m=>m.result==='L').length;
    const pts = played.reduce((s,m)=>s+(m.points||0),0);
    const winPct = played.length ? Math.round((wins/played.length)*100) : 0;
    
    // Recent streak
    const recent = played.slice(0,5).map(m => '<span class="bdg b'+m.result+'" style="margin-right:2px;padding:2px 5px">'+m.result+'</span>').join('');

    results.push({ team, played: played.length, wins, losses, pts, winPct, recent });
  }

  let html = '<div class="compare-banner fade-up"><h2>Team Vergelijking</h2><button class="btn-refresh" data-action="home">← Home</button></div>';
  html += '<div class="fade-up" style="overflow-x:auto;"><table class="compare-table"><thead><tr><th>Statistiek</th>';
  results.forEach(r => { html += '<th>'+esc(r.team.name)+'</th>'; });
  html += '</tr></thead><tbody>';

  const rows = [
    { label: 'Gespeeld', key: 'played' },
    { label: 'Gewonnen', key: 'wins' },
    { label: 'Verloren', key: 'losses' },
    { label: 'Punten behaald', key: 'pts' },
    { label: 'Winpercentage', key: 'winPct', fmt: v => v+'%' },
    { label: 'Recente Vorm (5)', key: 'recent', noBold: true }
  ];

  rows.forEach(row => {
    html += '<tr><td>'+row.label+'</td>';
    results.forEach(r => {
      let val = r[row.key];
      if(row.fmt) val = row.fmt(val);
      html += '<td>'+(row.noBold?val:'<strong>'+val+'</strong>')+'</td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  M.innerHTML = html;
}

// ═══════════════════════════════════════════
//  DISCOVER TEAMS
// ═══════════════════════════════════════════
async function discoverAllTeams(code, nameHint) {
  const cacheK = 'teams__' + code.toUpperCase();
  const cached = getCached(cacheK);
  if (cached) {
    cached.forEach(t => { TR[t.id] = t; });
    return cached;
  }

  const TYPE_RE = /\b(DS|HS|DA|DB|DC|DD|HA|HB|HC|HD|JA|JB|JC|JD|MA|MB|MC|MD|GEM|XR|N[1-4]|L[1-5])\s*(\d*)\b/i;
  const xml = await fetchRSS(verUrl(code));
  const allItems = parseRSS(xml);
  if (!allItems.length) throw new Error('Geen wedstrijden gevonden voor code '+code+'.');

  const thuisPerType = {};
  allItems.forEach(m => {
    if (!m.thuis) return;
    const match = m.thuis.match(TYPE_RE);
    if (!match) return;
    const type = rawTypeToApiType(match[1].toUpperCase());
    const nr   = parseInt(match[2]) || 1;
    if (!thuisPerType[type]) thuisPerType[type] = new Set();
    thuisPerType[type].add(nr);
  });

  if (!Object.keys(thuisPerType).length) throw new Error('Kon geen teamtypen herkennen.');

  const verifiedTeams = [];
  await Promise.all(Object.entries(thuisPerType).map(async ([type, nrSet]) => {
    const maxFound = Math.max(...nrSet);
    const candidates = [];
    for (let nr = 1; nr <= maxFound + 1; nr++) candidates.push(nr);
    const results = await Promise.all(candidates.map(async nr => {
      try { const txml = await fetchRSS(teamUrl(code, type, nr)); if (parseRSS(txml).length > 0) return nr; } catch {}
      return null;
    }));
    results.forEach(nr => {
      if (nr !== null) {
        const name = (nameHint || code) + ' ' + typeLabel(type) + ' ' + nr;
        verifiedTeams.push({ id: teamId(code, type, nr), name, code: code.toUpperCase(), type, nr });
      }
    });
  }));

  if (!verifiedTeams.length) throw new Error('Geen actieve teams gevonden.');
  verifiedTeams.sort((a, b) => a.type.localeCompare(b.type) || a.nr - b.nr);
  setCached('teams__' + code.toUpperCase(), verifiedTeams);
  return verifiedTeams;
}

    const insHtml = assocInsights.length
      ? '<div style="margin-top:14px">'+assocInsights.map(i=>'<div class="ins '+i.type+'" style="margin-bottom:8px"><div class="ins-i">'+i.icon+'</div><div><h4>'+i.title+'</h4><p>'+i.text+'</p></div></div>').join('')+'</div>'

        '<div style="text-align:center;border-top:1px solid var(--gray-100);padding-top:12px">' +
          '<div style="font-size:.7rem;color:var(--gray-400);font-weight:600;margin-bottom:4px">WINPERCENTAGE</div>' +

    // Controleer of er een kampioen is (via gecachte stand-data van eerdere team-bezoeken)

// Doorzoek gecachte stand-data (vanuit eerder bezochte team-pagina's) om te kijken
// of een team van deze vereniging momenteel eerste staat met significante voorsprong.
// Geeft { teamName, ptsDiff, standLength, pos1Name } terug of null.
function findCachedChampion(teams) {
  try {
    const results = [];
    for (let i = 0; i < localStorage.length; i++) {
      const rawKey = localStorage.key(i);
      if (!rawKey || !rawKey.startsWith(CPFX + 'stand__')) continue;
      const cacheK = rawKey.replace(CPFX, '');
      const standData = getCached(cacheK);
      if (!standData || !standData.length) continue;
      const leader = standData[0];
      const second = standData[1];
      if (!leader) continue;
      const ptsDiff = second ? leader.punten - second.punten : leader.punten;
      const maxWedstr = Math.max(...standData.map(r => r.wedstr));
      // Alleen tonen als het seizoen ver genoeg is en de voorsprong significant
      if (maxWedstr < 8 || ptsDiff < 3) continue;
      // Kijk of een van onze teams de leider is
      const myTeam = teams.find(t => {
        const words = t.name.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !/^\d+$/.test(w));
        return words.some(w => leader.name.toLowerCase().includes(w));
      });
      if (myTeam) {
        results.push({ team: myTeam, leader, ptsDiff, total: standData.length, wedstr: maxWedstr });
      }
    }
    // Kies de meest dominante (grootste puntenverschil)
    if (!results.length) return null;
    return results.sort((a, b) => b.ptsDiff - a.ptsDiff)[0];
  } catch { return null; }
}

async function loadTeam(team) {
  const myGen = ++gen; destroyCharts();
  SB.classList.remove('open'); document.getElementById('favDD').classList.remove('open');
  TR[team.id] = team;
  const M = document.getElementById('M');

  // In-memory cache: toon direct zonder netwerk
  if (PAGE_CACHE.team[team.id]) {
    M.innerHTML = PAGE_CACHE.team[team.id].html;
    renderTeamCharts(PAGE_CACHE.team[team.id].matches, team);
    return;
  }

  M.innerHTML = mkBanner(team, true) + '<div id="TC"><div class="nd">⏳ Gegevens ophalen…</div></div>';

  const key = cacheKey(team.code, team.type, team.nr);
  let allMatches = getCached(key);

  if (!allMatches) {
    try {
      const [resXml, prgXml] = await Promise.allSettled([fetchRSS(teamUrl(team.code, team.type, team.nr)), fetchRSS(programmaUrl(team.code, team.type, team.nr))]);
      if (myGen !== gen) return;
      const played  = resXml.status === 'fulfilled' ? parseRSS(resXml.value) : [];
      const planned = prgXml.status === 'fulfilled' ? parseRSS(prgXml.value) : [];
      if (!played.length && !planned.length) throw new Error('Geen data gevonden voor team.');
      // Sla channel-metadata op voor poule-detectie
      if (resXml.status === 'fulfilled') {
        const meta = parseRSSChannelMeta(resXml.value);
        team.channelLink  = meta.link;
        team.channelTitle = meta.title;
        TR[team.id] = team;
      }
      const playedTs = new Set(played.filter(m=>m.ts).map(m=>m.ts));
      const futurePlanned = planned.filter(m => m.ts && !playedTs.has(m.ts));
      allMatches = [...played, ...futurePlanned];
      setCached(key, allMatches);
    } catch(e) {
      if (myGen !== gen) return;
      M.innerHTML = mkBanner(team, false) + '<div class="err"><b>⚠️ Kon data niet laden</b><br><small>'+esc(e.message)+'</small></div>'; return;
    }
  }
  if (myGen !== gen) return;
  allMatches = enrichHA(allMatches, team.name).sort((a,b) => (b.ts||0)-(a.ts||0));

  // Detecteer seizoen uit de matches en sla snapshot op
  const snapshotsBySeason = {};
  allMatches.forEach(m => { if (m.season) { if (!snapshotsBySeason[m.season]) snapshotsBySeason[m.season] = []; snapshotsBySeason[m.season].push(m); } });
  Object.entries(snapshotsBySeason).forEach(([season, sMatches]) => {
    saveSeasonSnapshot(team.id, season, sMatches);
  });

  // Extraheer poule-info uit de eerste wedstrijd-link (als fallback voor stand-feed)
  const firstLink = allMatches.find(m => m.link)?.link || '';

  M.innerHTML = mkBanner(team, false) + '<div id="TC"></div>';
  renderTeam(allMatches, team, null);
  // Grafieken direct renderen (ook bij eerste load, niet alleen vanuit page cache)
  setTimeout(() => renderTeamCharts(allMatches, team), 50);

  // ── Stand laden via poule-URL ──
  // Prioriteit: 1) handmatige config, 2) POULE_DB (scraper-output), 3) item-links,
  //             4) channel-title tabel, 5) channel-link URL-parsing
  const channelTitle = team.channelTitle || '';
  const channelLink  = team.channelLink  || '';
  // Probeer alle item-links (meer kans op volledig pad dan alleen de eerste)
  const allLinks = allMatches.map(m => m.link).filter(Boolean);
  const linkInfo = allLinks.reduce((found, lnk) => found || pouleFromLink(lnk), null);
  const pouleInfo =
    getPouleConfig(team.id)                     ||  // 1. handmatig opgeslagen
    linkInfo                                    ||  // 2. uit wedstrijd-links (meest betrouwbaar)
    pouleFromDB(channelTitle, team.name)        ||  // 3. scraper-database (title + teamnaam)
    pouleFromTitle(channelTitle)                ||  // 4. vaste TITLE_TO_POULE tabel
    pouleFromLink(channelLink);                     // 5. channel-link URL

  console.log('[Stand] channel-title:', channelTitle || '(geen)');
  console.log('[Stand] pouleInfo:', pouleInfo);

  let standData = null;
  if (pouleInfo) {
    const standCK  = 'stand__' + pouleInfo.path.replace(/\//g, '__');
    const builtUrl = standUrl(pouleInfo.path);
    console.log('[Stand] URL:', builtUrl);
    standData = getCached(standCK);
    if (!standData) {
      try {
        const xml = await fetchRSS(builtUrl);
        if (myGen !== gen) return;
        const rows = parseStand(xml);
        console.log('[Stand] Geparsed:', rows.length, 'rijen');
        if (rows.length) { standData = rows; setCached(standCK, rows); }
        else {
          console.warn('[Stand] parseStand gaf 0 rijen. Eerste 500 tekens RSS:', xml.slice(0, 500));
        }
      } catch(e) { console.warn('[Stand] Fetch mislukt:', e.message); }
    }
  }

  if (myGen !== gen) return;
  const standEl = document.getElementById('stand-placeholder');
  if (standData && standData.length) {
    renderStand(standData, team.name);
  } else {
    // Toon configuratieformulier zodat gebruiker handmatig poule kan instellen
    if (standEl) standEl.innerHTML = renderStandConfigForm(team, pouleInfo, channelTitle);
  }

  // Sla op in page cache NADAT stand is geladen (zodat stand ook gecached wordt)
  PAGE_CACHE.team[team.id] = { html: M.innerHTML, matches: allMatches };
}

function refreshTeam(tid) {
  const team = TR[tid] || getFavTeams().find(t=>t.id===tid);
  if (!team) return;
  delCached(cacheKey(team.code, team.type, team.nr));
  // Wis ook de gecachte stand-data voor dit team
  const pouleCfg = getPouleConfig(tid);
  if (pouleCfg?.path) delCached('stand__' + pouleCfg.path.replace(/\//g, '__'));
  // Wis alle stand__-entries als vangnet (goedkoop, data wordt snel opnieuw geladen)
  try {
    const toDelete = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(CPFX + 'stand__')) toDelete.push(k.replace(CPFX, ''));
    }
    toDelete.forEach(k => delCached(k));
  } catch {}
  delete PAGE_CACHE.team[tid];
  loadTeam(team);
}

function renderStand(standData, teamName) {
  const el = document.getElementById('stand-placeholder');
  if (!el) return;

  // Zoek het team in de stand op naam (fuzzy: check of een woord van teamName in de stand-naam zit)
  const words = teamName.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !/^\d+$/.test(w));
  const myRow = standData.find(r => words.some(w => r.name.toLowerCase().includes(w)));
  const myPos = myRow ? myRow.pos : null;
  const total = standData.length;

  // Kampioen-detectie: positie 1 én seizoen vrijwel afgerond (≥80% wedstrijden gespeeld)
  const maxWedstr = Math.max(...standData.map(r => r.wedstr));
  const leader = standData[0];
  const second = standData[1];
  const ptsDiff = second ? leader.punten - second.punten : 0;
  const isChampion = leader && myRow && leader.name === myRow.name && maxWedstr >= 10 && ptsDiff >= 4;

  let html = '';

  if (isChampion) {
    html += '<div class="champion-banner fade-up">'+
      '<div class="cb-icon">🏆</div>'+
      '<div class="cb-body">'+
        '<div class="cb-title">Kampioen! 🎉</div>'+
        '<div class="cb-detail">'+esc(myRow.name)+' staat <strong>eerste</strong> met <strong>'+ptsDiff+' punt'+(ptsDiff!==1?'en':'')+' voorsprong</strong> op de nummer 2. Indrukwekkend seizoen!</div>'+
      '</div>'+
      '<div class="cb-pts">'+ptsDiff+'<small>pnt voorsp.</small></div>'+
    '</div>';
  } else if (myPos === 1 && !isChampion) {
    html += '<div style="background:var(--yellow-lt);border:1px solid var(--gold);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:.85rem;color:var(--yellow);font-weight:600">'+
      '🥇 Koploper! '+(ptsDiff > 0 ? ptsDiff+' punt'+(ptsDiff!==1?'en':'')+' voorsprong op de nummer 2.' : '')+
    '</div>';
  }

  html += '<div class="tcard"><table><thead><tr><th>#</th><th>Team</th><th>Gespeeld</th><th>Punten</th></tr></thead><tbody>';
  standData.forEach(r => {
    const isMe = myRow && r.pos === myRow.pos;
    html += `<tr style="${isMe ? 'background:var(--blue-lt);font-weight:600;' : ''}">` +
      `<td style="font-family:var(--mono);font-weight:700;color:${r.pos===1?'var(--gold)':r.pos<=3?'var(--blue)':'var(--gray-400)'}">${r.pos}</td>` +
      `<td>${esc(r.name)}${isMe ? ' <span class="lh">Jij</span>' : ''}</td>` +
      `<td style="font-family:var(--mono)">${r.wedstr}</td>` +
      `<td style="font-family:var(--mono);font-weight:700">${r.punten}</td>` +
      `</tr>`;
  });
  html += '</tbody></table></div>';

  el.innerHTML = html;
}

function renderTeam(matches, team) {
  const played = matches.filter(m=>m.result!==null);
  const future = matches.filter(m=>m.result===null);
  const wins   = played.filter(m=>m.result==='W');
  const losses = played.filter(m=>m.result==='L');
  const pts    = played.reduce((s,m)=>s+(m.points||0),0);
  const maxPts = played.length*3;
  const winPct = played.length ? Math.round(wins.length/played.length*100) : 0;
  const homeP  = played.filter(m=>m.isHome);
  const awayP  = played.filter(m=>!m.isHome);
  const homeW  = homeP.filter(m=>m.result==='W').length;
  const awayW  = awayP.filter(m=>m.result==='W').length;
  const recent = played.slice(0,8).reverse();

  // ── Inzichten berekenen ──
  const insights = buildInsights(played, homeP, awayP, homeW, awayW, wins, losses, future, team);

  // ── Tegenstander-analyse ──
  const oppMap = {};
  played.forEach(m => {
    if (!m.opponent) return;
    if (!oppMap[m.opponent]) oppMap[m.opponent] = { w:0, l:0, pts:0 };
    oppMap[m.opponent].w   += m.result==='W' ? 1 : 0;
    oppMap[m.opponent].l   += m.result==='L' ? 1 : 0;
    oppMap[m.opponent].pts += m.points || 0;
  });
  const oppRows = Object.entries(oppMap).sort((a,b) => (b[1].w - a[1].w) || (a[1].l - b[1].l));

  // ── Vorig seizoen ──
  const curSeason = currentSeason();
  const allSnapshots = listSeasonSnapshots(team.id);
  const prevSnapshots = allSnapshots.filter(s => s.season !== curSeason);
  const prevSnap = prevSnapshots[0] || null;

  const TC = document.getElementById('TC');
  TC.innerHTML =

function buildInsights(played, homeP, awayP, homeW, awayW, wins, losses, future, team) {
  const ins = [];
  if (played.length < 2) return ins;

  const winPct = Math.round(wins.length / played.length * 100);
  const homePct = homeP.length ? Math.round(homeW / homeP.length * 100) : null;
  const awayPct = awayP.length ? Math.round(awayW / awayP.length * 100) : null;

  // Thuisvoordeel / nadeel
  if (homePct !== null && awayPct !== null && homeP.length >= 2 && awayP.length >= 2) {
    const diff = homePct - awayPct;
    if (diff >= 20) ins.push({ type:'pos', icon:'🏠', title:'Sterk thuis', text:`Thuis winpercentage (${homePct}%) is significant hoger dan uit (${awayPct}%). Thuis spelen maakt duidelijk verschil.` });
    else if (diff <= -20) ins.push({ type:'neg', icon:'✈️', title:'Betere uitploeg', text:`Uitwedstrijden worden juist beter gespeeld (${awayPct}% winst) dan thuis (${homePct}%). Opvallend!` });
    else ins.push({ type:'neu', icon:'⚖️', title:'Consistent', text:`Vergelijkbare prestaties thuis (${homePct}%) en uit (${awayPct}%). Het niveau blijft stabiel ongeacht locatie.` });
  }

  // Reeks detectie
  const recent5 = played.slice(0, 5);
  const streak = played.reduce((acc, m) => {
    if (acc.done) return acc;
    if (acc.last === null || acc.last === m.result) { acc.last = m.result; acc.count++; }
    else acc.done = true;
    return acc;
  }, { last: null, count: 0, done: false });

  if (streak.count >= 3 && streak.last === 'W') ins.push({ type:'pos', icon:'🔥', title:`${streak.count} op rij gewonnen`, text:`Het team zit in een geweldige reeks — ${streak.count} wedstrijden achter elkaar gewonnen. Momentum zit mee!` });
  else if (streak.count >= 3 && streak.last === 'L') ins.push({ type:'neg', icon:'📉', title:`${streak.count} op rij verloren`, text:`De laatste ${streak.count} wedstrijden allemaal verloren. Tijd om het tij te keren.` });

  // 3-0 / 3-1 vs 3-2 verhouding
  const played3pts = played.filter(m => m.points === 3);
  const played2pts = played.filter(m => m.points === 2);
  if (wins.length >= 3) {
    const dominantPct = Math.round(played3pts.length / wins.length * 100);
    if (dominantPct >= 70) ins.push({ type:'pos', icon:'💪', title:'Dominant bij overwinningen', text:`${dominantPct}% van de gewonnen wedstrijden eindigde in 3-0 of 3-1. Het team verliest nauwelijks sets als het wint.` });
    else if (dominantPct <= 30 && wins.length >= 3) ins.push({ type:'warn', icon:'😅', title:'Veel spannende overwinningen', text:`De meeste overwinningen gaan via 3-2. Winst is winst, maar de marges zijn smal.` });
  }

  // Punten-efficiëntie
  const pts = played.reduce((s,m)=>s+(m.points||0),0);
  const maxPts = played.length * 3;
  const efficiency = Math.round(pts / maxPts * 100);
  if (played.length >= 4) {
    if (efficiency >= 80) ins.push({ type:'pos', icon:'🏆', title:'Zeer efficiënt', text:`${efficiency}% van alle mogelijke punten behaald. Uitmuntend seizoen tot nu toe.` });
    else if (efficiency <= 30) ins.push({ type:'neg', icon:'😬', title:'Weinig punten behaald', text:`Slechts ${efficiency}% van de mogelijke punten behaald. Er is ruimte voor verbetering.` });
  }

  // Komende wedstrijd
  if (future.length > 0) {
    const next = future[future.length - 1];
    const opp = next.isHome !== undefined ? (next.isHome ? next.uit : next.thuis) : (next.uit || next.thuis);
    ins.push({ type:'neu', icon:'📅', title:'Volgende wedstrijd', text:`${next.dateStr}${next.timeStr ? ' om '+next.timeStr : ''} — ${esc(opp||'onbekend')}.` });
  }

  return ins.slice(0, 4); // max 4 inzichten
}

function renderInsight(ins) {
  return '<div class="ins '+ins.type+'"><div class="ins-i">'+ins.icon+'</div><div><h4>'+ins.title+'</h4><p>'+ins.text+'</p></div></div>';
}

function renderOpponentTab(oppRows, future, team) {
  if (!oppRows.length) return '<div class="nd">Nog geen tegenstanders om te tonen.</div>';

  // Komende tegenstanders koppelen aan historische data
  const nextOpps = new Set(future.map(m => m.thuis === team.name ? m.uit : m.thuis).filter(Boolean));

  let html = '<div class="tcard" style="margin-bottom:14px"><table><thead><tr><th>Tegenstander</th><th>Gespeeld</th><th>Winst</th><th>Verlies</th><th>Pnt</th><th>Winst %</th></tr></thead><tbody>';
  oppRows.forEach(([opp, s]) => {
    const total = s.w + s.l;
    const pct = Math.round(s.w / total * 100);
    const isNext = [...nextOpps].some(n => n.toLowerCase().includes(opp.toLowerCase().split(' ')[0]) || opp.toLowerCase().includes(n.toLowerCase().split(' ')[0]));
    const badge = isNext ? '<span class="si-tag" style="background:var(--yellow-lt);color:var(--yellow)">Volgende</span>' : '';
    const winBadge = pct >= 67 ? '<span class="bdg bW">'+pct+'%</span>' : pct <= 33 ? '<span class="bdg bL">'+pct+'%</span>' : '<span class="bdg bP">'+pct+'%</span>';
    html += '<tr><td><strong>'+esc(opp)+'</strong> '+badge+'</td><td style="font-family:var(--mono)">'+total+'</td><td style="font-family:var(--mono);color:var(--green)">'+s.w+'</td><td style="font-family:var(--mono);color:var(--red)">'+s.l+'</td><td style="font-family:var(--mono)">'+s.pts+'</td><td>'+winBadge+'</td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderPrevSeasonTab(snap, team) {
  const matches = snap.matches || [];
  const played = matches.filter(m=>m.result!==null);
  const wins   = played.filter(m=>m.result==='W');
  const losses = played.filter(m=>m.result==='L');
  const pts    = played.reduce((s,m)=>s+(m.points||0),0);
  const winPct = played.length ? Math.round(wins.length/played.length*100) : 0;

  // Vergelijk met huidig seizoen (gebruikt alleen de doorgegeven stats, geen extra berekening)
  let html = '<div class="info-box">📦 Seizoen <strong>'+snap.season+'</strong> — '+played.length+' gespeeld, '+wins.length+' gewonnen, '+losses.length+' verloren, '+pts+' punten ('+winPct+'% win)</div>';

  // Tegenstander-vergelijking: zijn er tegenstanders die je ook dit seizoen tegenkomt?
  const oppMap = {};
  played.forEach(m => {
    if (!m.opponent) return;
    if (!oppMap[m.opponent]) oppMap[m.opponent] = { w:0, l:0 };
    oppMap[m.opponent].w += m.result==='W'?1:0;
    oppMap[m.opponent].l += m.result==='L'?1:0;
  });

  html += '<div class="tcard"><table><thead><tr><th>Datum</th><th>Loc.</th><th>Tegenstander</th><th>Stand</th><th>Resultaat</th><th>Pnt</th></tr></thead><tbody>';
  if (played.length) {
    html += played.map(m =>
      '<tr>'+
      '<td style="font-family:var(--mono);font-size:.78rem;white-space:nowrap">'+m.dateStr+'</td>'+
      '<td>'+(m.isHome?'<span class="lh">Thuis</span>':'<span class="la">Uit</span>')+'</td>'+
      '<td><strong>'+esc(m.opponent||'—')+'</strong></td>'+
      '<td class="score">'+m.scoreStr+'</td>'+
      '<td><span class="bdg b'+m.result+'">'+(m.result==='W'?'Gewonnen':'Verloren')+'</span></td>'+
      '<td class="pts-val pts-'+m.points+'">'+m.points+'</td>'+
      '</tr>'
    ).join('');
  } else {
    html += '<tr><td colspan="6" class="nd">Geen data beschikbaar voor dit seizoen.</td></tr>';
  }
  html += '</tbody></table></div>';

  if (!played.length) {
    html += '<div class="info-box" style="margin-top:12px">💡 <strong>Tip:</strong> Seizoensdata wordt automatisch opgeslagen zodra je een team bekijkt. Bezoek dit team aan het einde van het huidige seizoen om de data voor volgend seizoen te bewaren.</div>';
  }

  return html;
}

// Extraheer het poule-pad uit een URL die de gebruiker heeft ingetypt
function poulePathFromInput(url) {
  if (!url) return null;
  const u = url.trim();
  // Patroon: api.nevobo.nl/export/poule/{pad}/stand.rss
  let m = u.match(/\/export\/poule\/([a-z][a-z0-9-]*(?:\/[a-z0-9][a-z0-9-]*){1,2})\/stand\.rss/i);
  if (m) return m[1];
  // Patroon: api.nevobo.nl/export/poule/{pad}
  m = u.match(/\/export\/poule\/([a-z][a-z0-9-]*(?:\/[a-z0-9][a-z0-9-]*){1,2})/i);
  if (m) return m[1];
  // Patroon: volleybal.nl/competitie/{type}/{regio}/{competition}/{poule}
  m = u.match(/\/competitie\/[a-z]+\/([a-z][a-z0-9-]*\/[a-z0-9][a-z0-9-]*\/[a-z0-9][a-z0-9-]*)(?:[/?#]|$)/i);
  if (m) return m[1];
  // Patroon: volleybal.nl/competitie/{type}/{regio}/{poule} (2-segment)
  m = u.match(/\/competitie\/[a-z]+\/([a-z][a-z0-9-]*\/[a-z0-9][a-z0-9-]*)(?:[/?#]|$)/i);
  if (m) return m[1];
  return null;
}

function savePouleConfig(teamId) {
  const rawUrl = document.getElementById('pouleCfgUrl')?.value?.trim();
  const path = poulePathFromInput(rawUrl);
  if (!path) { alert('Kon geen geldige poule-URL herkennen. Plak de volledige URL van volleybal.nl of de Nevobo stand-RSS.'); return; }
  setPouleConfig(teamId, path);
  // Wis alle stand-caches voor dit team zodat de nieuwe URL geprobeerd wordt
  delCached('stand__' + path.replace(/\//g, '__'));
  delete PAGE_CACHE.team[teamId];
  const team = TR[teamId];
  if (team) loadTeam(team);
}

// ═══════════════════════════════════════════
//  EVENT DELEGATION
// ═══════════════════════════════════════════
document.addEventListener('click', e => {
  const siClub = e.target.closest('.si[data-club], .assoc-tile[data-club]');
  if (siClub && !e.target.closest('[data-rmassoc]') && !e.target.closest('input[type="checkbox"]')) {
    SB.classList.remove('open');
    showAssocPage(siClub.dataset.club, siClub.dataset.name || '');
    return;
  }
  
  const favGo = e.target.closest('[data-tid-go]');
  if (favGo && !e.target.closest('input[type="checkbox"]')) {
     const team = TR[favGo.dataset.tidGo] || getFavTeams().find(t=>t.id===favGo.dataset.tidGo);
     if (team) loadTeam(team);
     return;
  }

  const rmAssoc = e.target.closest('[data-rmassoc]');
  if (rmAssoc) { e.stopPropagation(); removeSavedAssoc(rmAssoc.dataset.rmassoc); renderHome(); return; }

  const teamLi = e.target.closest('.team-li[data-tid]');
  if (teamLi) { const team = TR[teamLi.dataset.tid]; if (team) loadTeam(team); return; }

  if (e.target.closest('[data-action="toggle-fav-dd"]')) { e.stopPropagation(); document.getElementById('favDD').classList.toggle('open'); return; }

  const ddFavGo = e.target.closest('[data-favtid-go]');
  if (ddFavGo && !e.target.closest('[data-rmfav]')) { document.getElementById('favDD').classList.remove('open'); const team = TR[ddFavGo.dataset.favtidGo]; if (team) loadTeam(team); return; }

  const rmFav = e.target.closest('[data-rmfav]');
  if (rmFav) { e.stopPropagation(); removeFavTeam(rmFav.dataset.rmfav); renderFavDD(); renderHome(); return; }

  const tab = e.target.closest('.tab[data-pane]');
  if (tab) {
    tab.closest('.tabs').querySelectorAll('.tab').forEach(b=>b.classList.remove('on')); tab.classList.add('on');
    document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
    const pane = document.getElementById(tab.dataset.pane); if (pane) pane.classList.add('on'); return;
  }

  const act = e.target.closest('[data-action]');
  if (act) {
    const a = act.dataset.action;
    if (a === 'home')          { renderHome(); return; }
    if (a === 'refresh-assoc') { refreshAssoc(act.dataset.code, act.dataset.name); return; }
    if (a === 'refresh-team')  { refreshTeam(act.dataset.tid); return; }
    if (a === 'back-to-assoc') { showAssocPage(act.dataset.code, act.dataset.name); return; }
    if (a === 'toggle-save-assoc') {
      const nowSaved = toggleSavedAssoc(act.dataset.code, act.dataset.name);
      act.classList.toggle('saved', nowSaved); act.textContent = nowSaved ? '✓ Opgeslagen' : '+ Opslaan'; return;
    }
    if (a === 'toggle-fav-team') {
      const team = TR[act.dataset.tid] || getFavTeams().find(t=>t.id===act.dataset.tid);
      if (team) { const nowFav = toggleFavTeam(team); act.classList.toggle('saved', nowFav); act.textContent = nowFav ? '★ Favoriet' : '☆ Favoriet'; }
      return;
    }
  }
});

(function() {
  getFavTeams().forEach(t => { TR[t.id] = t; });
  updateFavCount(); renderHome(); loadClubsDB();
  // Laad poule-database asynchroon (hoeft niet af te zijn voor de eerste render)
  // Probeer eerst de backend-API, dan poule_db.json als statisch bestand (GitHub Pages / lokaal)
  (async function loadPouleDB() {
    const sources = ['/api/poules', './poule_db.json'];
    for (const src of sources) {
      try {
        const r = await fetch(src);
        if (!r.ok) continue;
        const data = await r.json();
        if (Array.isArray(data) && data.length) {
          POULE_DB = data;
          console.log('[POULE_DB] Geladen van', src, '—', data.length, 'poules');
          return;
        }
      } catch (_) { /* probeer volgende */ }
    }
    console.info('[POULE_DB] Geen poule-database gevonden, stand-detectie via fallbacks');
  })();
})();
