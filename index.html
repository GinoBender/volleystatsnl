<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolleyStatsNL — Volleybalstatistieken</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:#fafafa;color:#111;min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased}

/* ── TOKENS ── */
:root{
  --black:#0a0a0a;--white:#ffffff;
  --gray-50:#f9f9f9;--gray-100:#f2f2f2;--gray-200:#e5e5e5;
  --gray-300:#d4d4d4;--gray-400:#a3a3a3;--gray-500:#737373;
  --gray-700:#404040;--gray-900:#171717;
  --blue:#1a6ef5;--blue-lt:#e8f0fe;
  --green:#16a34a;--green-lt:#dcfce7;
  --red:#dc2626;--red-lt:#fef2f2;
  --yellow:#d97706;--yellow-lt:#fffbeb;
  --gold:#eab308;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',system-ui,sans-serif;
  --radius:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
}

/* ── NAV ── */
nav{background:var(--white);border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1180px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0;user-select:none;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--black);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:.95rem;font-weight:700;letter-spacing:-.3px;color:var(--black);line-height:1}
.logo-text span{color:var(--blue)}

/* Search */
.nav-search{flex:1;max-width:480px;position:relative}
.search-field{display:flex;align-items:center;background:var(--gray-100);border:1px solid transparent;border-radius:var(--radius);transition:border-color .15s,background .15s;overflow:hidden}
.search-field:focus-within{background:var(--white);border-color:var(--gray-300);box-shadow:var(--shadow)}
.search-icon{padding:0 10px 0 14px;color:var(--gray-400);flex-shrink:0;display:flex;align-items:center}
.search-field input{flex:1;border:none;outline:none;background:transparent;padding:9px 4px;font-family:var(--sans);font-size:.9rem;color:var(--black);min-width:0}
.search-field input::placeholder{color:var(--gray-400)}
.search-clear{padding:0 12px;color:var(--gray-400);cursor:pointer;display:none;align-items:center;font-size:18px;line-height:1}
.search-field:focus-within .search-clear{display:flex}

/* Suggest dropdown */
.sugg{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-md);z-index:200;display:none;overflow:hidden;max-height:380px;overflow-y:auto}
.sugg.open{display:block}
.sdiv{padding:7px 14px;font-size:.7rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;background:var(--gray-50);border-bottom:1px solid var(--gray-100)}
.si{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--gray-100);transition:background .1s}
.si:last-child{border-bottom:none}
.si:hover{background:var(--gray-50)}
.si-ico{font-size:15px;flex-shrink:0}
.si-name{font-size:.88rem;font-weight:500;color:var(--black)}
.si-meta{font-size:.76rem;color:var(--gray-400);font-family:var(--mono)}
.si-tag{margin-left:auto;font-size:.68rem;background:var(--blue-lt);color:var(--blue);border-radius:20px;padding:2px 8px;font-weight:600;flex-shrink:0;font-family:var(--mono)}
.si-tag.saved{background:var(--green-lt);color:var(--green)}

/* Favorites dropdown */
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.fav-wrap{position:relative}
.fav-btn{background:none;border:1px solid var(--gray-200);border-radius:var(--radius);color:var(--gray-700);font-family:var(--sans);font-size:.84rem;font-weight:500;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color .15s,background .15s;white-space:nowrap}
.fav-btn:hover{border-color:var(--gray-300);background:var(--gray-50)}
.fav-btn .fav-count{background:var(--gold);color:#fff;border-radius:10px;padding:1px 7px;font-size:.7rem;font-weight:700;font-family:var(--mono);min-width:18px;text-align:center}
.fav-dd{position:absolute;top:calc(100% + 6px);right:0;width:320px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-md);z-index:200;display:none;max-height:420px;overflow-y:auto}
.fav-dd.open{display:block}
.fav-dd-head{padding:10px 14px;font-size:.7rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;background:var(--gray-50);border-bottom:1px solid var(--gray-100)}
.fav-item{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--gray-100);transition:background .1s}
.fav-item:last-child{border-bottom:none}
.fav-item:hover{background:var(--gray-50)}
.fav-item-ico{font-size:15px;flex-shrink:0;color:var(--gold)}
.fav-item-info{flex:1;min-width:0}
.fav-item-name{font-size:.86rem;font-weight:600;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-item-meta{font-size:.72rem;color:var(--gray-400);font-family:var(--mono)}
.fav-item-rm{background:none;border:none;color:var(--gray-300);font-size:1rem;cursor:pointer;padding:2px 6px;flex-shrink:0;transition:color .15s}
.fav-item-rm:hover{color:var(--red)}
.fav-empty{padding:20px;text-align:center;color:var(--gray-400);font-size:.83rem}

/* ── MAIN ── */
main{max-width:1180px;margin:0 auto;padding:36px 24px 80px}

/* ── HOME ── */
.home-hero{text-align:center;padding:48px 0 36px}
.home-hero h2{font-size:2.1rem;font-weight:700;letter-spacing:-.6px;line-height:1.2;margin-bottom:12px;color:var(--black)}
.home-hero p{font-size:1rem;color:var(--gray-500);max-width:460px;margin:0 auto 30px;line-height:1.6}

.search-big{max-width:560px;margin:0 auto;display:flex;background:var(--white);border:1px solid var(--gray-200);border-radius:12px;box-shadow:var(--shadow-md);overflow:visible;position:relative}
.search-big input{flex:1;border:none;outline:none;padding:14px 18px;font-family:var(--sans);font-size:.95rem;color:var(--black);background:transparent;min-width:0;border-radius:12px 0 0 12px}
.search-big input::placeholder{color:var(--gray-400)}
.search-big button{background:var(--black);border:none;color:var(--white);font-family:var(--sans);font-size:.88rem;font-weight:600;padding:0 22px;cursor:pointer;flex-shrink:0;transition:opacity .15s;border-radius:0 12px 12px 0}
.search-big button:hover{opacity:.85}
.search-big .sugg{top:calc(100% + 8px)}

/* Saved verenigingen */
.saved-section{margin-top:42px;max-width:760px;margin-left:auto;margin-right:auto}
.saved-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--gray-400);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.saved-label::after{content:'';flex:1;height:1px;background:var(--gray-200)}
.assoc-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.assoc-tile{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;align-items:center;gap:12px;user-select:none;position:relative}
.assoc-tile:hover{border-color:var(--gray-300);box-shadow:var(--shadow)}
.assoc-tile-ico{width:36px;height:36px;border-radius:8px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.assoc-tile-info{flex:1;min-width:0}
.assoc-tile-name{font-size:.88rem;font-weight:600;color:var(--black);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.assoc-tile-meta{font-size:.72rem;color:var(--gray-400);font-family:var(--mono);margin-top:2px}
.assoc-tile-rm{background:none;border:none;color:var(--gray-300);font-size:1rem;cursor:pointer;padding:4px 6px;line-height:1;flex-shrink:0;transition:color .15s}
.assoc-tile-rm:hover{color:var(--red)}

.no-saved{background:var(--white);border:1px dashed var(--gray-300);border-radius:12px;padding:32px;text-align:center}
.no-saved p{font-size:.88rem;color:var(--gray-500);line-height:1.5;max-width:340px;margin:0 auto}

/* ── VERENIGING PAGE ── */
.assoc-banner{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:18px 22px;display:flex;align-items:center;gap:14px;margin-bottom:18px}
.back-btn{background:none;border:1px solid var(--gray-200);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-500);font-size:1.1rem;transition:border-color .15s,color .15s;flex-shrink:0}
.back-btn:hover{border-color:var(--gray-400);color:var(--black)}
.assoc-banner-ico{width:42px;height:42px;border-radius:10px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.assoc-banner-info{flex:1;min-width:0}
.assoc-banner-info h2{font-size:1.15rem;font-weight:700;letter-spacing:-.3px;color:var(--black)}
.assoc-banner-meta{font-size:.78rem;color:var(--gray-400);margin-top:2px;font-family:var(--mono)}
.assoc-actions{display:flex;gap:8px;flex-shrink:0}
.btn-save{background:var(--black);border:1px solid var(--black);border-radius:8px;color:var(--white);font-family:var(--sans);font-size:.82rem;font-weight:600;padding:7px 14px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-save:hover{opacity:.85}
.btn-save.saved{background:var(--green-lt);border-color:var(--green);color:var(--green)}
.btn-refresh{background:none;border:1px solid var(--gray-200);border-radius:8px;padding:7px 12px;font-size:.78rem;font-weight:500;color:var(--gray-500);cursor:pointer;font-family:var(--sans);transition:border-color .15s,color .15s;white-space:nowrap}
.btn-refresh:hover{border-color:var(--gray-400);color:var(--black)}
.badge-loading{background:var(--gray-100);color:var(--gray-500);border-radius:20px;padding:5px 12px;font-size:.76rem;font-weight:500;display:flex;align-items:center;gap:6px;flex-shrink:0;font-family:var(--mono)}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.assoc-grid{display:grid;grid-template-columns:280px 1fr 280px;gap:16px;align-items:start}
.assoc-col{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;overflow:hidden}
.assoc-col-head{padding:14px 16px;border-bottom:1px solid var(--gray-200);background:var(--gray-50);display:flex;align-items:center;justify-content:space-between}
.assoc-col-head h3{font-size:.88rem;font-weight:700;letter-spacing:-.2px;color:var(--black)}
.assoc-col-head .ach-count{font-size:.72rem;color:var(--gray-400);font-family:var(--mono)}

/* Teams list (left col) */
.team-li{padding:11px 14px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s}
.team-li:last-child{border-bottom:none}
.team-li:hover{background:var(--gray-50)}
.team-li-info{flex:1;min-width:0}
.team-li-name{font-size:.85rem;font-weight:600;color:var(--black);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-li-meta{font-size:.7rem;color:var(--gray-400);font-family:var(--mono);margin-top:1px}
.fav-star{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--gray-300);padding:2px 4px;flex-shrink:0;transition:color .15s,transform .1s;line-height:1}
.fav-star:hover{color:var(--gold);transform:scale(1.15)}
.fav-star.on{color:var(--gold)}

/* Recent matches (middle col) */
.match-li{padding:10px 14px;border-bottom:1px solid var(--gray-100);font-size:.82rem}
.match-li:last-child{border-bottom:none}
.match-li-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.match-date{font-size:.7rem;color:var(--gray-400);font-family:var(--mono);flex-shrink:0}
.match-team{font-size:.83rem;font-weight:500;color:var(--black);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match-vs{display:flex;align-items:center;gap:8px}
.match-vs .vs-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.84rem}
.match-vs .vs-name.own{font-weight:600}
.match-score{font-family:var(--mono);font-weight:700;font-size:.85rem;flex-shrink:0;padding:1px 7px;border-radius:5px}
.match-score.W{background:var(--green-lt);color:var(--green)}
.match-score.L{background:var(--red-lt);color:var(--red)}
.match-score.P{background:var(--gray-100);color:var(--gray-500)}

/* Stats (right col) */
.stat-blk{padding:14px 16px;border-bottom:1px solid var(--gray-100)}
.stat-blk:last-child{border-bottom:none}
.stat-blk-l{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin-bottom:4px;font-family:var(--mono)}
.stat-blk-v{font-size:1.5rem;font-weight:700;letter-spacing:-.6px;line-height:1;color:var(--black)}
.stat-blk-s{font-size:.72rem;color:var(--gray-400);margin-top:3px}
.stat-blk-v.green{color:var(--green)}
.stat-blk-v.red{color:var(--red)}
.stat-blk-v.blue{color:var(--blue)}
.stat-row-2{display:grid;grid-template-columns:1fr 1fr;gap:0}
.stat-row-2 .stat-blk{border-bottom:1px solid var(--gray-100)}
.stat-row-2 .stat-blk:first-child{border-right:1px solid var(--gray-100)}

.no-data{padding:24px;text-align:center;color:var(--gray-400);font-size:.84rem;font-family:var(--mono)}

/* ── TEAM PAGE (existing rendering) ── */
.team-banner{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:20px}
.banner-ico{width:40px;height:40px;border-radius:10px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.banner-info{flex:1;min-width:0}
.banner-info h2{font-size:1.1rem;font-weight:700;letter-spacing:-.3px;color:var(--black)}
.banner-meta{font-size:.76rem;color:var(--gray-400);margin-top:2px;font-family:var(--mono)}
.banner-meta b{color:var(--blue)}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
.sc{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px}
.sc .l{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin-bottom:6px;font-family:var(--mono)}
.sc .v{font-size:1.65rem;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--black)}
.sc .s{font-size:.72rem;color:var(--gray-400);margin-top:4px}
.sc.c-blue .v{color:var(--blue)}
.sc.c-green .v{color:var(--green)}
.sc.c-red .v{color:var(--red)}

.tabs-wrap{border-bottom:1px solid var(--gray-200);margin-bottom:18px}
.tabs{display:flex;gap:0}
.tab{background:none;border:none;padding:10px 18px;font-family:var(--sans);font-size:.88rem;font-weight:500;color:var(--gray-400);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:color .15s}
.tab:hover{color:var(--gray-700)}
.tab.on{color:var(--black);border-bottom-color:var(--black);font-weight:600}
.pane{display:none}.pane.on{display:block}

.tcard{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.tcard table{width:100%;border-collapse:collapse}
.tcard thead tr{background:var(--gray-50)}
.tcard th{padding:9px 14px;font-size:.68rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--gray-200);font-family:var(--mono)}
.tcard td{padding:10px 14px;border-bottom:1px solid var(--gray-100);vertical-align:middle;font-size:.88rem;color:var(--black)}
.tcard tr:last-child td{border-bottom:none}
.tcard tr:hover td{background:var(--gray-50)}
.score{font-weight:700;font-family:var(--mono)}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:.72rem;font-weight:600;font-family:var(--mono)}
.bW{background:var(--green-lt);color:var(--green)}
.bL{background:var(--red-lt);color:var(--red)}
.bP{background:var(--gray-100);color:var(--gray-400)}
.lh{background:var(--blue-lt);color:var(--blue);padding:2px 8px;border-radius:5px;font-size:.68rem;font-weight:600;font-family:var(--mono)}
.la{background:var(--yellow-lt);color:var(--yellow);padding:2px 8px;border-radius:5px;font-size:.68rem;font-weight:600;font-family:var(--mono)}
.pts-val{font-weight:700;font-family:var(--mono)}
.pts-3{color:var(--green)}.pts-2{color:#65a30d}.pts-1{color:var(--yellow)}.pts-0{color:var(--red)}

.form-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.fd{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;font-family:var(--mono)}
.fd.W{background:var(--green);color:#fff}
.fd.L{background:var(--red);color:#fff}
.fd.P{background:var(--gray-200);color:var(--gray-400)}
.form-lbl{font-size:.72rem;color:var(--gray-400);margin-left:4px;font-family:var(--mono)}

.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.cc{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:18px}
.cc h3{font-size:.9rem;font-weight:700;color:var(--black);margin-bottom:2px;letter-spacing:-.2px}
.cc .cs{font-size:.76rem;color:var(--gray-400);margin-bottom:14px;line-height:1.4}
.cc canvas{max-height:185px}

.ins-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:16px}
.ins{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px 16px;display:flex;gap:12px}
.ins-i{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.ins h4{font-size:.84rem;font-weight:700;color:var(--black);margin-bottom:3px;letter-spacing:-.2px}
.ins p{font-size:.77rem;color:var(--gray-500);line-height:1.55}
.ins.pos{border-left:3px solid var(--green)}
.ins.neg{border-left:3px solid var(--red)}
.ins.neu{border-left:3px solid var(--blue)}
.ins.warn{border-left:3px solid var(--yellow)}

.sl{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--gray-400);margin-bottom:10px;margin-top:2px;font-family:var(--mono)}
.err{background:var(--red-lt);border:1px solid #fca5a5;border-radius:var(--radius);padding:14px 16px;color:#991b1b;font-size:.86rem;text-align:center}
.info-box{background:var(--blue-lt);border:1px solid #93c5fd;border-radius:var(--radius);padding:12px 16px;color:#1e40af;font-size:.83rem;margin-bottom:14px;line-height:1.5}
.nd{text-align:center;padding:28px;color:var(--gray-400);font-size:.86rem;font-family:var(--mono)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease both}

/* ── RESPONSIVE ── */
@media(max-width:920px){
  .assoc-grid{grid-template-columns:1fr;gap:12px}
}
@media(max-width:640px){
  .logo-text{display:none}
  .nav-search{max-width:none}
  .fav-btn span:not(.fav-count){display:none}
  .fav-dd{width:280px}
  .chart-grid{grid-template-columns:1fr}
  .tcard th:nth-child(5),.tcard td:nth-child(5){display:none}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a class="logo" data-action="home">
      <div class="logo-mark">🏐</div>
      <div class="logo-text">Volley<span>Stats</span>NL</div>
    </a>

    <div class="nav-search" id="navSearch">

<script>
// ═══════════════════════════════════════════
//  CONSTANTEN
// ═══════════════════════════════════════════
const NEVOBO    = 'https://api.nevobo.nl';
const EXPORT    = NEVOBO + '/export';
const STORE_ASSOCS = 'vs_assocs_saved_v2';
const STORE_FAVS   = 'vs_fav_teams_v1';
const CPFX      = 'vs_c4_';
const TTL       = 3600000; // 1 uur

// Proxy-keten: probeer op volgorde, stop bij eerste succes
const PROXY_CHAIN = [
  { url: u => 'https://corsproxy.io/?' + encodeURIComponent(u), raw: true },
  { url: u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u), raw: false },
  { url: u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u), raw: true },
];

// Generatie-counter (voorkomt race-conditions tussen async fetches)
let gen = 0;

// Volledige clubsdatabase (geladen uit nevobo_clubs.json) — code → {code, name}
const CLUBS = {};
let clubsLoaded = false;

// Dynamisch register van team-objecten (id → object) voor snelle navigatie
const TR = {};

// Chart-instanties
let charts = {};

// ═══════════════════════════════════════════
//  OPSLAG
// ═══════════════════════════════════════════
function getSavedAssocs() {
  try { return JSON.parse(localStorage.getItem(STORE_ASSOCS)) || []; } catch { return []; }
}
function saveSavedAssocs(arr) {
  try { localStorage.setItem(STORE_ASSOCS, JSON.stringify(arr)); } catch {}
}
function isAssocSaved(code) {
  return getSavedAssocs().some(a => a.code === code.toUpperCase());
}
function toggleSavedAssoc(code, name) {
  const C = code.toUpperCase();
  let saved = getSavedAssocs();
  if (saved.some(a => a.code === C)) {
    saved = saved.filter(a => a.code !== C);
  } else {
    saved.push({ code: C, name });
  }
  saveSavedAssocs(saved);
  return saved.some(a => a.code === C);
}
function removeSavedAssoc(code) {
  const C = code.toUpperCase();
  saveSavedAssocs(getSavedAssocs().filter(a => a.code !== C));
}

function getFavTeams() {
  try { return JSON.parse(localStorage.getItem(STORE_FAVS)) || []; } catch { return []; }
}
function saveFavTeams(arr) {
  try { localStorage.setItem(STORE_FAVS, JSON.stringify(arr)); } catch {}
}
function isFavTeam(id) {
  return getFavTeams().some(t => t.id === id);
}
function toggleFavTeam(team) {
  let favs = getFavTeams();
  if (favs.some(t => t.id === team.id)) {
    favs = favs.filter(t => t.id !== team.id);
  } else {
    favs.push(team);

  TR[team.id] = team;

  return favs.some(t => t.id === team.id);
}
function removeFavTeam(id) {

}

// Cache
function getCached(k) {
  try {
    const r = localStorage.getItem(CPFX+k);
    if (!r) return null;
    const {ts,d} = JSON.parse(r);
    if (Date.now()-ts > TTL) { localStorage.removeItem(CPFX+k); return null; }
    return d;
  } catch { return null; }
}
function setCached(k,d) {
  try { localStorage.setItem(CPFX+k, JSON.stringify({ts:Date.now(),d})); } catch {}
}
function delCached(k) { try { localStorage.removeItem(CPFX+k); } catch {} }

// ═══════════════════════════════════════════
//  CLUBS DATABASE LOADER
// ═══════════════════════════════════════════
async function loadClubsDB() {
  // Probeer eerst naast HTML, dan in Scraper-folder
  const paths = ['nevobo_clubs.json', 'Scraper/nevobo_clubs.json'];
  for (const p of paths) {
    try {
      const r = await fetch(p);
      if (!r.ok) continue;
      const data = await r.json();
      if (Array.isArray(data)) {
        data.forEach(c => {
          if (c.code && c.name) CLUBS[c.code.toUpperCase()] = { code: c.code.toUpperCase(), name: c.name };
        });
        clubsLoaded = true;
        console.log('[VolleyStats] '+Object.keys(CLUBS).length+' verenigingen geladen uit '+p);
        return;
      }
    } catch(e) {
      console.warn('[VolleyStats] Kon '+p+' niet laden:', e.message);
    }
  }
  console.error('[VolleyStats] Verenigingsdatabase kon niet geladen worden. Plaats nevobo_clubs.json naast index.html.');
}

//  URL-BUILDER
// ═══════════════════════════════════════════
function teamUrl(code,type,nr)      { return EXPORT+'/team/'+code.toUpperCase()+'/'+type+'/'+nr+'/resultaten.rss'; }
function programmaUrl(code,type,nr) { return EXPORT+'/team/'+code.toUpperCase()+'/'+type+'/'+nr+'/programma.rss'; }
function verUrl(code)               { return EXPORT+'/vereniging/'+code.toUpperCase()+'/resultaten.rss'; }
function cacheKey(code,type,nr)     { return code.toUpperCase()+'__'+type+'__'+nr; }

// ═══════════════════════════════════════════
//  FETCH RSS — proxy-fallback keten
// ═══════════════════════════════════════════
async function fetchRSS(url) {
  let lastErr = null;
  for (const proxy of PROXY_CHAIN) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 10000);
    try {
      const r = await fetch(proxy.url(url), {signal: ctrl.signal});
      clearTimeout(t);
      if (!r.ok) throw new Error('HTTP '+r.status);
      if (proxy.raw) {
        const text = await r.text();
        if (!text || text.length < 50) throw new Error('Lege response');
        return text;
      } else {
        const j = await r.json();
        if (!j.contents) throw new Error('Lege proxy response');
        return j.contents;
      }
    } catch(e) {
      clearTimeout(t);
      lastErr = e;
      console.warn('[VolleyStats] Proxy mislukt:', e.message);
    }
  }
  throw new Error('Alle proxies mislukten: '+(lastErr?.message||'onbekend'));
}

// ═══════════════════════════════════════════
//  PARSE RSS
// ═══════════════════════════════════════════
function parseRSS(xml) {
  const doc = new DOMParser().parseFromString(xml,'text/xml');
  if (doc.querySelector('parsererror')) throw new Error('Ongeldige RSS');
  return [...doc.querySelectorAll('item')].map(parseItem);
}

function parseItem(item) {
  const title    = (item.querySelector('title')?.textContent||'').trim();
  const desc     = (item.querySelector('description')?.textContent||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  const pubDate  = (item.querySelector('pubDate')?.textContent||'').trim();
  const link     = (item.querySelector('link')?.textContent||'').trim();
  const category = (item.querySelector('category')?.textContent||'').trim().toLowerCase();

  let ts=null, dateStr='—', timeStr='';
  if (pubDate) {
    const d = new Date(pubDate);
    if (!isNaN(d)) {
      ts = d.getTime();
      dateStr = d.toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
      const h = d.getHours(), m2 = d.getMinutes();
      if (h > 0 || m2 > 0) timeStr = String(h).padStart(2,'0')+':'+String(m2).padStart(2,'0');
    }
  }

  let thuis='', uit='', scoreStr='', sw=0, sl=0;
  const uitslag_idx = title.indexOf(', Uitslag:');
  const teamsPart   = uitslag_idx>=0 ? title.slice(0,uitslag_idx) : title;
  const scorePart   = uitslag_idx>=0 ? title.slice(uitslag_idx+10).trim() : '';

  if (scorePart) {
    const sm = scorePart.match(/^(\d+)\s*-\s*(\d+)/);
    if (sm) { sw=+sm[1]; sl=+sm[2]; scoreStr=sw+'-'+sl; }
  }

  const teamSplit = teamsPart.split(/\s+-\s+/);
  thuis = (teamSplit[0]||'').trim();
  uit   = (teamSplit.slice(1).join(' - ')||'').trim();

  const sets=[];
  const setM = desc.match(/Setstanden:\s*([\d,\s-]+)/i);
  if (setM) {
    const sr = /(\d{1,2})-(\d{1,2})/g; let m;
    while ((m=sr.exec(setM[1]))!==null) {
      const a=+m[1],b=+m[2];
      if (Math.max(a,b)>=10 && Math.max(a,b)<=35) sets.push([a,b]);
    }
  }

  const played_cat = category === 'gespeeld' || (scoreStr !== '');

  let result=null, points=null;
  if (scoreStr) {
    result = sw>sl ? 'W' : 'L';
    points = result==='W' ? (sl<=1?3:2) : (sw===2?1:0);
  }

  return {ts,dateStr,timeStr,thuis,uit,scoreStr,sw,sl,sets,result,points,link,played_cat};
}

function enrichHA(matches,teamName) {
  const words = teamName.toLowerCase().split(/\s+/).filter(w=>w.length>2 && !/^\d+$/.test(w));
  return matches.map(m=>{
    const tl = m.thuis.toLowerCase();
    const isHome = words.some(w=>tl.includes(w));
    const opponent = isHome ? m.uit : m.thuis;

    let result = null, points = null;
    if (m.scoreStr) {
      const teamWon = isHome ? m.sw > m.sl : m.sl > m.sw;
      const teamSets = isHome ? m.sw : m.sl;
      const oppSets  = isHome ? m.sl : m.sw;
      result = teamWon ? 'W' : 'L';
      if (teamWon) {
        points = oppSets <= 1 ? 3 : 2;
      } else {
        points = teamSets === 2 ? 1 : 0;
      }
    }

    return{...m, isHome, opponent, result, points};
  });
}

// ═══════════════════════════════════════════
//  ZOEKEN — alleen verenigingen uit clubsDB
// ═══════════════════════════════════════════
function searchClubs(q, limit=12) {
  const ql = q.toLowerCase().trim();
  if (!ql) return [];
  const all = Object.values(CLUBS);
  // Exact code match
  const exact = all.filter(c => c.code.toLowerCase() === ql);
  if (exact.length) return exact;
  // Naam start
  const starts = all.filter(c => c.name.toLowerCase().startsWith(ql));
  // Naam bevat
  const contains = all.filter(c => c.name.toLowerCase().includes(ql) && !c.name.toLowerCase().startsWith(ql));
  // Code bevat
  const codeMatch = all.filter(c => c.code.toLowerCase().includes(ql) && !c.name.toLowerCase().includes(ql));
  return [...starts, ...contains, ...codeMatch].slice(0, limit);
}

//  VERENIGING PAGE
// ═══════════════════════════════════════════
async function showAssocPage(code, name) {
  const myGen = ++gen;
  destroyCharts();
  document.getElementById('favDD').classList.remove('open');
  SB.classList.remove('open');

  const C = code.toUpperCase();
  const clubName = name || CLUBS[C]?.name || C;

  const M = document.getElementById('M');
  M.innerHTML = mkAssocBanner(C, clubName, true) +
    '<div id="AC"><div class="nd" style="padding:60px"><span class="spin" style="font-size:1.4rem">⟳</span><br><br>Wedstrijden ophalen voor '+esc(clubName)+'…</div></div>';

  const cacheK = 'assoc__'+C;
  let allItems = getCached(cacheK);

  if (!allItems) {
    try {
      const xml = await fetchRSS(verUrl(C));
      if (myGen !== gen) return;
      allItems = parseRSS(xml);
      if (!allItems.length) throw new Error('Geen wedstrijden gevonden voor '+C);
      setCached(cacheK, allItems);
    } catch(e) {
      if (myGen !== gen) return;
      M.innerHTML = mkAssocBanner(C, clubName, false) +
        '<div class="err"><b>⚠️ Kon data niet laden</b><br><small>'+esc(e.message)+'</small></div>';
      return;
    }
  }
  if (myGen !== gen) return;

  renderAssocPage(C, clubName, allItems);
}

function refreshAssoc(code, name) {
  delCached('assoc__'+code.toUpperCase());
  showAssocPage(code, name);
}

        : '<button class="btn-refresh" data-action="refresh-assoc" data-code="'+esc(code)+'" data-name="'+esc(name)+'">🔄 Vernieuwen</button>') +
      '<button class="btn-save'+(saved?' saved':'')+'" data-action="toggle-save-assoc" data-code="'+esc(code)+'" data-name="'+esc(name)+'">'+
        (saved ? '✓ Opgeslagen' : '+ Opslaan')+
      '</button>'+
    '</div>'+
  '</div>';
}

function renderAssocPage(code, clubName, allItems) {
  const TYPE_RE = /\b(DS|HS|DA|DB|DC|DD|HA|HB|HC|HD|JA|JB|JC|JD|MA|MB|MC|MD|GEM|XR|N[1-4]|L[1-5])\s*(\d*)\b/i;

  // Frequentietelling: eigen teams >> tegenstanders
  const nameCount = {};
  allItems.forEach(m => {
    [m.thuis, m.uit].forEach(n => { if(n) nameCount[n] = (nameCount[n]||0)+1; });
  });
  const threshold = Math.max(2, Math.ceil(allItems.length * 0.18));
  const ownNames  = new Set(Object.entries(nameCount).filter(([,cnt])=>cnt>=threshold).map(([n])=>n));

  // Groepeer per eigen team
  const byTeam = {};
  allItems.forEach(m => {
    const own = [m.thuis, m.uit].find(n => ownNames.has(n));
    if (!own) return;
    if (!byTeam[own]) byTeam[own] = [];
    byTeam[own].push(m);
  });

  // Bouw team-objecten
  const teams = [];
  Object.entries(byTeam).forEach(([rawName, matches]) => {
    const tm = rawName.match(TYPE_RE);
    if (!tm) return;
    const type = rawTypeToApiType(tm[1].toUpperCase());
    const nr   = parseInt(tm[2]) || 1;
    const cn   = rawName.replace(TYPE_RE,'').replace(/[-–\s]+$/,'').trim() || clubName;
    const dispName = cn + ' ' + tm[1].toUpperCase() + ' ' + nr;
    const obj = {
      id: teamId(code, type, nr),
      name: dispName,
      rawName,
      code: code.toUpperCase(),
      type, nr,
      matches
    };
    TR[obj.id] = { id: obj.id, name: obj.name, code: obj.code, type: obj.type, nr: obj.nr };
    teams.push(obj);
  });

  // Sorteer op type-prio en nummer
  const TYPE_PRIO = {DS:1,HS:2,DA:3,DB:4,DC:5,DD:6,JA:7,JB:8,JC:9,JD:10,MA:11,MB:12,MC:13,MD:14,GEM:15,XR:16};
  teams.sort((a,b) => {
    const at = (a.rawName.match(TYPE_RE)?.[1]||'').toUpperCase();
    const bt = (b.rawName.match(TYPE_RE)?.[1]||'').toUpperCase();
    return (TYPE_PRIO[at]||99) - (TYPE_PRIO[bt]||99) || a.nr - b.nr;
  });

  // Bouw stats per team
  const teamStats = teams.map(t => {
    const played = t.matches.filter(m=>m.scoreStr);
    const isHomeArr = played.map(m => m.thuis === t.rawName);
    const wins = played.filter((m,i) => isHomeArr[i] ? m.sw>m.sl : m.sl>m.sw).length;
    const losses = played.length - wins;
    const pts = played.reduce((s,m,i) => {
      const isH = isHomeArr[i];
      const tw = isH ? m.sw : m.sl;
      const tl = isH ? m.sl : m.sw;
      return s + (tw>tl ? (tl<=1?3:2) : (tw===2?1:0));
    }, 0);
    return { team:t, played:played.length, wins, losses, pts };
  });

  // Aggregaat statistieken
  const totalGames = teamStats.reduce((s,x)=>s+x.played, 0);
  const totalWins  = teamStats.reduce((s,x)=>s+x.wins, 0);
  const totalLoss  = teamStats.reduce((s,x)=>s+x.losses, 0);
  const totalPts   = teamStats.reduce((s,x)=>s+x.pts, 0);
  const winPct     = totalGames ? Math.round(totalWins/totalGames*100) : 0;
  const avgPerTeam = teams.length ? (totalGames/teams.length).toFixed(1) : 0;
  const eff        = totalGames ? Math.round(totalPts/(totalGames*3)*100) : 0;

  // Recente wedstrijden van vereniging (alleen eigen teams, gespeeld OF gepland)
  const ownMatches = allItems
    .filter(m => ownNames.has(m.thuis) || ownNames.has(m.uit))
    .sort((a,b) => (b.ts||0)-(a.ts||0));
  const recentList = ownMatches.slice(0, 30);

  // Render banner opnieuw zonder loading
  const M = document.getElementById('M');
  M.innerHTML = mkAssocBanner(code, clubName, false) + '<div id="AC"></div>';
  const AC = document.getElementById('AC');

  // ── LEFT: teams lijst ──
  const favIds = new Set(getFavTeams().map(t=>t.id));
  const teamsHtml = teamStats.length
    ? teamStats.map(s => {
        const isFav = favIds.has(s.team.id);
        const sub = s.played
          ? s.played+'G · '+s.wins+'W · '+s.losses+'V · '+s.pts+'pnt'
          : 'geen uitslagen';
        return '<div class="team-li" data-tid="'+esc(s.team.id)+'">'+
          '<div class="team-li-info">'+
            '<div class="team-li-name">'+esc(s.team.name)+'</div>'+
            '<div class="team-li-meta">'+esc(sub)+'</div>'+
          '</div>'+
          '<button class="fav-star'+(isFav?' on':'')+'" data-favtid="'+esc(s.team.id)+'" title="'+(isFav?'Verwijder uit favorieten':'Voeg toe aan favorieten')+'">★</button>'+
        '</div>';
      }).join('')
    : '<div class="no-data">Geen teams gevonden</div>';

  // ── MIDDLE: recente wedstrijden ──
  const matchesHtml = recentList.length
    ? recentList.map(m => {
        const ownIsHome = ownNames.has(m.thuis);
        const own = ownIsHome ? m.thuis : m.uit;
        const opp = ownIsHome ? m.uit : m.thuis;
        let res = 'P';
        if (m.scoreStr) {
          const won = ownIsHome ? m.sw>m.sl : m.sl>m.sw;
          res = won ? 'W' : 'L';
        }
        const scoreDisp = m.scoreStr ? (ownIsHome ? m.scoreStr : (m.sl+'-'+m.sw)) : (m.timeStr||'—');
        return '<div class="match-li">'+
          '<div class="match-li-top">'+
            '<span class="match-date">'+esc(m.dateStr)+'</span>'+
            (m.timeStr && m.scoreStr ? '<span class="match-date">'+esc(m.timeStr)+'</span>' : '')+
            (ownIsHome ? '<span class="lh">Thuis</span>' : '<span class="la">Uit</span>')+
          '</div>'+
          '<div class="match-vs">'+
            '<span class="vs-name own">'+esc(own)+'</span>'+
            '<span style="color:var(--gray-300);font-size:.75rem">vs</span>'+
            '<span class="vs-name">'+esc(opp)+'</span>'+
            '<span class="match-score '+res+'">'+esc(scoreDisp)+'</span>'+
          '</div>'+
        '</div>';
      }).join('')
    : '<div class="no-data">Nog geen wedstrijden</div>';

  // ── RIGHT: stats ──
  const statsHtml =
    '<div class="stat-blk"><div class="stat-blk-l">Teams</div><div class="stat-blk-v blue">'+teams.length+'</div></div>'+
    '<div class="stat-row-2">'+
      '<div class="stat-blk"><div class="stat-blk-l">Gespeeld</div><div class="stat-blk-v">'+totalGames+'</div></div>'+
      '<div class="stat-blk"><div class="stat-blk-l">Per team</div><div class="stat-blk-v">'+avgPerTeam+'</div></div>'+
    '</div>'+
    '<div class="stat-row-2">'+
      '<div class="stat-blk"><div class="stat-blk-l">Gewonnen</div><div class="stat-blk-v green">'+totalWins+'</div></div>'+
      '<div class="stat-blk"><div class="stat-blk-l">Verloren</div><div class="stat-blk-v red">'+totalLoss+'</div></div>'+
    '</div>'+
    '<div class="stat-blk"><div class="stat-blk-l">Winpercentage</div><div class="stat-blk-v '+(winPct>=50?'green':winPct>=35?'':'red')+'">'+winPct+'%</div><div class="stat-blk-s">'+totalWins+'/'+totalGames+' wedstrijden</div></div>'+
    '<div class="stat-blk"><div class="stat-blk-l">Punten</div><div class="stat-blk-v">'+totalPts+'</div><div class="stat-blk-s">van max. '+(totalGames*3)+' ('+eff+'% efficiëntie)</div></div>';

  AC.innerHTML =
    '<div class="assoc-grid fade-up">'+
      // LEFT
      '<div class="assoc-col">'+
        '<div class="assoc-col-head"><h3>Teams</h3><span class="ach-count">'+teams.length+'</span></div>'+
        teamsHtml+
      '</div>'+
      // MIDDLE
      '<div class="assoc-col">'+
        '<div class="assoc-col-head"><h3>Recente wedstrijden</h3><span class="ach-count">'+recentList.length+'</span></div>'+
        matchesHtml+
      '</div>'+
      // RIGHT
      '<div class="assoc-col">'+
        '<div class="assoc-col-head"><h3>Statistieken</h3></div>'+
        statsHtml+
      '</div>'+
    '</div>';
}

async function loadTeam(team) {
  const myGen = ++gen;
  destroyCharts();
  SB.classList.remove('open');
  document.getElementById('favDD').classList.remove('open');
  TR[team.id] = team;

  const M = document.getElementById('M');
  M.innerHTML = mkBanner(team, true) +
    '<div id="TC"><div class="nd">⏳ Gegevens ophalen…</div></div>';

  const key = cacheKey(team.code, team.type, team.nr);
  let allMatches = getCached(key);

  if (!allMatches) {
    try {
      const [resXml, prgXml] = await Promise.allSettled([
        fetchRSS(teamUrl(team.code, team.type, team.nr)),
        fetchRSS(programmaUrl(team.code, team.type, team.nr))
      ]);
      if (myGen !== gen) return;
      const played  = resXml.status === 'fulfilled' ? parseRSS(resXml.value) : [];
      const planned = prgXml.status === 'fulfilled' ? parseRSS(prgXml.value) : [];
      if (!played.length && !planned.length) throw new Error('Geen data gevonden voor team.');
      const playedTs = new Set(played.filter(m=>m.ts).map(m=>m.ts));
      const futurePlanned = planned.filter(m => m.ts && !playedTs.has(m.ts));
      allMatches = [...played, ...futurePlanned];
      setCached(key, allMatches);
    } catch(e) {
      if (myGen !== gen) return;
      M.innerHTML = mkBanner(team, false) +
        '<div class="err"><b>⚠️ Kon data niet laden</b><br><small>'+esc(e.message)+'</small></div>';
      return;
    }
  }
  if (myGen !== gen) return;

  allMatches = enrichHA(allMatches, team.name).sort((a,b) => (b.ts||0)-(a.ts||0));

  M.innerHTML = mkBanner(team, false) + '<div id="TC"></div>';
  renderTeam(allMatches, team);
}

function refreshTeam(tid) {
  const team = TR[tid] || getFavTeams().find(t=>t.id===tid);
  if (!team) return;
  delCached(cacheKey(team.code, team.type, team.nr));
  loadTeam(team);
}

function renderTeam(matches, team) {
  const played = matches.filter(m=>m.result!==null);
  const future = matches.filter(m=>m.result===null);
  const wins   = played.filter(m=>m.result==='W');
  const losses = played.filter(m=>m.result==='L');
  const pts    = played.reduce((s,m)=>s+(m.points||0),0);
  const maxPts = played.length*3;
  const winPct = played.length ? Math.round(wins.length/played.length*100) : 0;
  const homeP  = played.filter(m=>m.isHome);
  const awayP  = played.filter(m=>!m.isHome);
  const homeW  = homeP.filter(m=>m.result==='W').length;
  const awayW  = awayP.filter(m=>m.result==='W').length;
  const recent     = played.slice(0,8).reverse();
  const playedDesc = played;

  const withSets = played.filter(m=>m.sets.length>=3);
  const setSt = [0,1,2,3,4].map(i=>{
    const rel = withSets.filter(m=>m.sets.length>i);
    if (rel.length<2) return null;
    const sw = rel.filter(m => m.isHome ? m.sets[i][0]>m.sets[i][1] : m.sets[i][1]>m.sets[i][0]);
    return {set:i+1, total:rel.length, wins:sw.length, pct:Math.round(sw.length/rel.length*100)};
  }).filter(Boolean);

  const sd = {};
  played.forEach(m => { if (m.scoreStr) sd[m.scoreStr] = (sd[m.scoreStr]||0)+1; });

  let rp = 0;
  const rpArr = [...played].reverse().map(m => { rp += (m.points||0); return rp; });

  const TC = document.getElementById('TC');
  TC.innerHTML =
    '<div class="stat-row fade-up">'+
      sv('c-blue','Gespeeld',played.length,future.length+' gepland')+
      sv('c-green','Gewonnen',wins.length,winPct+'% winratio')+
      sv('c-red','Verloren',losses.length,'')+
      sv('','Punten',pts,'van max. '+maxPts)+
      sv('','Efficiëntie',(maxPts?Math.round(pts/maxPts*100):0)+'%','')+
    '</div>'+

    '<div class="tabs-wrap"><div class="tabs">'+
      '<button class="tab on" data-pane="tr">Uitslagen</button>'+
      '<button class="tab" data-pane="tp">Programma</button>'+
      '<button class="tab" data-pane="ta">Analyse</button>'+
    '</div></div>'+

    '<div id="tr" class="pane on">'+
      (recent.length
        ? '<div class="sl">Recente vorm <span style="font-weight:400;color:var(--gray-400)">— ← oudst &nbsp; meest recent →</span></div>'+
          '<div class="form-row">'+
            recent.map(m=>'<div class="fd '+m.result+'" title="'+esc(m.dateStr)+' – '+esc(m.opponent)+' '+m.scoreStr+'">'+m.result+'</div>').join('')+
            '<span class="form-lbl">laatste '+recent.length+' wedstrijden</span>'+
          '</div>'
        : '')+
      '<div class="tcard"><table>'+
        '<thead><tr><th>Datum</th><th>Tijd</th><th>Loc.</th><th>Tegenstander</th><th>Stand</th><th>Resultaat</th><th>Pnt</th></tr></thead>'+
        '<tbody>'+
          (playedDesc.length
            ? playedDesc.map(m=>
                '<tr>'+
                '<td style="font-family:var(--mono);font-size:.78rem;white-space:nowrap">'+m.dateStr+'</td>'+
                '<td style="font-family:var(--mono);font-size:.78rem;color:var(--gray-400)">'+(m.timeStr||'—')+'</td>'+
                '<td>'+(m.isHome?'<span class="lh">Thuis</span>':'<span class="la">Uit</span>')+'</td>'+
                '<td><strong>'+esc(m.opponent||'—')+'</strong>'+
                  (m.link?' <a href="'+esc(m.link)+'" target="_blank" style="color:var(--blue);font-size:.7rem;font-family:var(--mono)">↗</a>':'')+'</td>'+
                '<td class="score">'+m.scoreStr+'</td>'+
                '<td><span class="bdg b'+m.result+'">'+(m.result==='W'?'Gewonnen':'Verloren')+'</span></td>'+
                '<td class="pts-val pts-'+m.points+'">'+m.points+'</td>'+
                '</tr>'
              ).join('')
            : '<tr><td colspan="7" class="nd">Nog geen gespeelde wedstrijden</td></tr>')+
        '</tbody></table></div>'+
    '</div>'+

    '<div id="tp" class="pane">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
        '<span style="font-size:.82rem;color:var(--gray-400)">'+future.length+' aankomende wedstrijd'+(future.length!==1?'en':'')+'</span>'+
        '<a href="'+EXPORT+'/team/'+team.code.toUpperCase()+'/'+team.type+'/'+team.nr+'/programma.ics" target="_blank" '+
           'style="display:inline-flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600;color:var(--blue);text-decoration:none;border:1px solid var(--blue);border-radius:6px;padding:4px 10px" '+
           'title="Importeer in Apple Kalender, Google Agenda, Outlook e.d.">'+
          '📅 iCal exporteren'+
        '</a>'+
      '</div>'+
      '<div class="tcard"><table>'+
        '<thead><tr><th>Datum</th><th>Tijd</th><th>Thuisploeg</th><th>Uitploeg</th></tr></thead>'+
        '<tbody>'+
          (future.length
            ? future.map(m=>'<tr>'+
                '<td style="font-family:var(--mono);font-size:.78rem;white-space:nowrap">'+m.dateStr+'</td>'+
                '<td style="font-family:var(--mono);font-size:.78rem;color:var(--gray-400)">'+(m.timeStr||'—')+'</td>'+
                '<td>'+esc(m.thuis)+'</td>'+
                '<td>'+esc(m.uit)+'</td>'+
              '</tr>').join('')
            : '<tr><td colspan="4" class="nd">Geen programma in de feed</td></tr>')+
        '</tbody></table></div>'+
    '</div>'+

    '<div id="ta" class="pane">'+
      (played.length<3 ? '<div class="info-box">⏳ Nog onvoldoende data voor analyse. Kom later terug!</div>' : '')+
      '<div class="chart-grid">'+
        (played.length>=3
          ? '<div class="cc"><h3>Puntenscore seizoen</h3><div class="cs">Cumulatief — vlakke fase wijst op moeilijke periode.</div><canvas id="cPts"></canvas></div>'+
            '<div class="cc"><h3>Score-verdeling</h3><div class="cs">3-0/3-1 = dominantie, 3-2 = veerkracht.</div><canvas id="cSco"></canvas></div>'
          : '')+
        (setSt.length>=3
          ? '<div class="cc"><h3>Set-voor-set winratio</h3><div class="cs">Structurele zwaktes per set ('+withSets.length+' wedstrijden).</div><canvas id="cSet"></canvas></div>'
          : '')+
        (homeP.length>=2&&awayP.length>=2
          ? '<div class="cc"><h3>Thuis vs Uit</h3><div class="cs">Winstpercentage eigen veld vs uitwedstrijden.</div><canvas id="cHAw"></canvas></div>'
          : '')+
      '</div>'+
      '<div class="sl">Slimme inzichten</div>'+
      '<div class="ins-grid" id="IG"></div>'+
    '</div>';

  if (played.length>=3) {
    mkChart('cPts', {type:'line', data:{
      labels:played.map((_,i)=>'W'+(i+1)),
      datasets:[{label:'Punten',data:rpArr,borderColor:'#1a6ef5',backgroundColor:'rgba(26,110,245,.06)',fill:true,tension:.35,pointRadius:3,pointBackgroundColor:'#1a6ef5'}]
    }, options:cOpts()});
    const sk = Object.keys(sd).sort();
    if (sk.length) mkChart('cSco', {type:'doughnut', data:{
      labels:sk.map(k=>{const[a,b]=k.split('-').map(Number);return a>b?'Won '+k:'Verloren '+k;}),
      datasets:[{data:sk.map(k=>sd[k]),backgroundColor:sk.map(k=>{const[a,b]=k.split('-').map(Number);return a>b?'rgba(22,163,74,.8)':'rgba(220,38,38,.8)';}),borderColor:'#fff',borderWidth:3}]
    }, options:{plugins:{legend:{position:'right',labels:{color:'#737373',font:{size:11,family:'DM Mono'},padding:12}}},responsive:true}});
  }
  if (setSt.length>=3) mkChart('cSet', {type:'bar', data:{
    labels:setSt.map(s=>'Set '+s.set),
    datasets:[{label:'Gewonnen %',data:setSt.map(s=>s.pct),backgroundColor:setSt.map(s=>s.pct>=60?'rgba(22,163,74,.8)':s.pct>=40?'rgba(217,119,6,.8)':'rgba(220,38,38,.8)'),borderRadius:6,borderSkipped:false}]
  }, options:cOpts({max:100,unit:'%'})});
  if (homeP.length>=2 && awayP.length>=2) mkChart('cHAw', {type:'bar', data:{
    labels:['Thuis W','Thuis V','Uit W','Uit V'],
    datasets:[{data:[homeW,homeP.length-homeW,awayW,awayP.length-awayW],backgroundColor:['rgba(22,163,74,.75)','rgba(220,38,38,.65)','rgba(22,163,74,.4)','rgba(220,38,38,.35)'],borderRadius:6,borderSkipped:false}]
  }, options:cOpts()});

  genInsights(played, setSt, sd, homeP, awayP, homeW, awayW, pts, maxPts);
}

function sv(cl,l,v,s) {
  return '<div class="sc '+cl+'"><div class="l">'+l+'</div><div class="v">'+v+'</div>'+(s?'<div class="s">'+s+'</div>':'')+'</div>';
}
function cOpts({max=null,unit=''}={}) {
  return {responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:'#a3a3a3',font:{size:10,family:'DM Mono'}},grid:{color:'rgba(0,0,0,.04)'}},
      y:{ticks:{color:'#a3a3a3',font:{size:10,family:'DM Mono'},callback:v=>v+unit},grid:{color:'rgba(0,0,0,.04)'},beginAtZero:true,...(max?{max}:{})}}};
}
function mkChart(id,cfg) { const el = document.getElementById(id); if (!el) return; charts[id] = new Chart(el, cfg); }
function destroyCharts() { Object.values(charts).forEach(c=>{try{c.destroy();}catch{}}); charts = {}; }

function genInsights(played,setSt,sd,homeP,awayP,homeW,awayW,pts,maxPts) {
  const ins=[];
  const ig = document.getElementById('IG');
  if (!ig) return;
  if (!played.length) { ig.innerHTML = '<p class="nd">Speel meer wedstrijden voor inzichten.</p>'; return; }

  if (setSt.length>=3) {
    const worst = [...setSt].sort((a,b)=>a.pct-b.pct)[0];
    const best  = [...setSt].sort((a,b)=>b.pct-a.pct)[0];
    if (worst.pct<42 && worst.total>=3) ins.push({c:'neg',i:'📉',t:'Set '+worst.set+' is structureel zwak',p:'Slechts '+worst.pct+'% gewonnen ('+worst.total+'x). Gerichte training op dit moment loont.'});
    if (best.pct>65 && best.total>=3)  ins.push({c:'pos',i:'💪',t:'Set '+best.set+' is jullie kracht',p:best.pct+'% gewonnen — gebruik dit mentale fundament als buffer voor zwakkere sets.'});
    const tb = setSt.find(s=>s.set===5);
    if (tb && tb.total>=2) ins.push({c:tb.pct>=50?'pos':'neg',i:'⚡',t:'Tie-break: '+tb.wins+'/'+tb.total+' gewonnen',p:tb.pct>=50?'Goed presteren onder druk.':'Tie-break strategie en mentale fitheid verdienen extra aandacht.'});
  }
  if (homeP.length>=3 && awayP.length>=3) {
    const hp=homeW/homeP.length, ap=awayW/awayP.length;
    if (hp-ap>0.3) ins.push({c:'neg',i:'✈️',t:'Moeite met uitwedstrijden',p:'Thuis '+Math.round(hp*100)+'% vs uit '+Math.round(ap*100)+'%. Warming-up routine voor uitwedstrijden kan helpen.'});
    else if (ap-hp>0.2) ins.push({c:'pos',i:'🏟️',t:'Sterk op vreemde bodem',p:'Uit ('+Math.round(ap*100)+'%) beter dan thuis ('+Math.round(hp*100)+'%).'});
  }
  const res = played.map(m=>m.result);
  let mxW=0,mxL=0,cW=0,cL=0;
  res.forEach(r => { r==='W'?(cW++,cL=0,mxW=Math.max(mxW,cW)):(cL++,cW=0,mxL=Math.max(mxL,cL)); });
  if (mxW>=4) ins.push({c:'pos',i:'🔥',t:'Winserie van '+mxW,p:mxW+' overwinningen op rij — uitstekend collectief momentum.'});
  if (mxL>=3) ins.push({c:'neg',i:'❄️',t:'Verliesreeks van '+mxL,p:'Evaluatie na 2 verliezen op rij kan verdere reeks voorkomen.'});
  const r5 = played.slice(-5); const r5w = r5.filter(m=>m.result==='W').length;
  if (r5.length===5 && r5w>=4) ins.push({c:'pos',i:'📈',t:'Stijgende lijn',p:'Laatste 5 wedstrijden: '+r5w+'x gewonnen. Uitstekende vorm!'});
  if (r5.length===5 && r5w<=1) ins.push({c:'neg',i:'📉',t:'Dalende lijn',p:'Slechts '+r5w+'/5 recentelijk gewonnen. Analyse loont.'});
  const eff = maxPts ? Math.round(pts/maxPts*100) : 0;
  if (eff>=70) ins.push({c:'pos',i:'🏆',t:'Hoge efficiëntie: '+eff+'%',p:pts+' van max. '+maxPts+' punten — bovengemiddeld seizoen.'});
  else if (eff<35 && played.length>=5) ins.push({c:'warn',i:'📊',t:'Lage efficiëntie: '+eff+'%',p:'Focus op 3-2 overwinningen verbetert de score snel.'});
  const tight = (sd['3-2']||0)+(sd['2-3']||0);
  if (tight>=3) ins.push({c:'neu',i:'⚖️',t:tight+'× naar 5 sets',p:'Veel spannende 5-setters — moeite om vroeg te beslissen.'});
  if (!ins.length) ins.push({c:'neu',i:'📋',t:'Meer data nodig',p:'Meer gespeelde wedstrijden geven betere patroonherkenning.'});

  ig.innerHTML = ins.map(i =>
    '<div class="ins '+i.c+' fade-up"><div class="ins-i">'+i.i+'</div><div><h4>'+i.t+'</h4><p>'+i.p+'</p></div></div>'
  ).join('');
}

// ═══════════════════════════════════════════
//  FAVORIETEN DROPDOWN
// ═══════════════════════════════════════════
function updateFavCount() {
  const n = getFavTeams().length;
  const el = document.getElementById('favCount');
  if (el) el.textContent = n;
  renderFavDD();
}
function renderFavDD() {
  const dd = document.getElementById('favDD');
  if (!dd) return;
  const favs = getFavTeams();
  if (!favs.length) {
    dd.innerHTML = '<div class="fav-empty">Nog geen favoriete teams.<br><span style="font-size:.78rem;color:var(--gray-400)">Klik op ★ bij een team in een vereniging.</span></div>';
    return;
  }
  // Groepeer per vereniging
  const byCode = {};
  favs.forEach(t => { (byCode[t.code] = byCode[t.code]||[]).push(t); });
  const keys = Object.keys(byCode).sort((a,b) => (CLUBS[a]?.name||a).localeCompare(CLUBS[b]?.name||b));
  let html = '<div class="fav-dd-head">Favoriete teams ('+favs.length+')</div>';
  keys.forEach(code => {
    const cName = CLUBS[code]?.name || code;
    html += '<div style="padding:8px 14px 4px;font-size:.7rem;color:var(--gray-400);font-family:var(--mono);background:var(--gray-50);border-bottom:1px solid var(--gray-100);font-weight:600">'+esc(cName)+' · '+esc(code)+'</div>';
    byCode[code].forEach(t => {
      TR[t.id] = t;
      html += '<div class="fav-item" data-favtid-go="'+esc(t.id)+'">'+
        '<div class="fav-item-ico">★</div>'+
        '<div class="fav-item-info">'+
          '<div class="fav-item-name">'+esc(t.name)+'</div>'+
          '<div class="fav-item-meta">'+esc(typeLabel(t.type))+' '+t.nr+'</div>'+
        '</div>'+
        '<button class="fav-item-rm" data-rmfav="'+esc(t.id)+'" title="Verwijderen">✕</button>'+
      '</div>';
    });
  });
  dd.innerHTML = html;
}

// ═══════════════════════════════════════════
//  EVENT DELEGATION
// ═══════════════════════════════════════════
document.addEventListener('click', e => {
  // Suggestion: club
  const siClub = e.target.closest('.si[data-club], .assoc-tile[data-club]');
  if (siClub && !e.target.closest('[data-rmassoc]')) {
    SB.classList.remove('open');
    const SBH = document.getElementById('SBH'); if (SBH) SBH.classList.remove('open');
    showAssocPage(siClub.dataset.club, siClub.dataset.name || '');
    return;
  }

  // Verwijder opgeslagen vereniging op home
  const rmAssoc = e.target.closest('[data-rmassoc]');
  if (rmAssoc) {
    e.stopPropagation();
    e.preventDefault();
    removeSavedAssoc(rmAssoc.dataset.rmassoc);
    renderHome();
    return;
  }

  // Klik op team in vereniging-pagina (left col)
  const teamLi = e.target.closest('.team-li[data-tid]');
  if (teamLi && !e.target.closest('.fav-star')) {
    const team = TR[teamLi.dataset.tid];
    if (team) loadTeam(team);
    return;
  }

  // Toggle favorite-star op team-li
  const favStar = e.target.closest('.fav-star[data-favtid]');
  if (favStar) {
    e.stopPropagation();
    const tid = favStar.dataset.favtid;
    const team = TR[tid] || getFavTeams().find(t=>t.id===tid);
    if (team) {
      const nowFav = toggleFavTeam(team);
      favStar.classList.toggle('on', nowFav);
      favStar.title = nowFav ? 'Verwijder uit favorieten' : 'Voeg toe aan favorieten';
    }
    return;
  }

  // Favorieten dropdown toggle
  if (e.target.closest('[data-action="toggle-fav-dd"]')) {
    e.stopPropagation();
    const dd = document.getElementById('favDD');
    if (!dd.classList.contains('open')) renderFavDD();
    dd.classList.toggle('open');
    return;
  }

  // Open team vanuit favorieten-dropdown
  const favGo = e.target.closest('[data-favtid-go]');
  if (favGo && !e.target.closest('[data-rmfav]')) {
    document.getElementById('favDD').classList.remove('open');
    const tid = favGo.dataset.favtidGo;
    const team = TR[tid] || getFavTeams().find(t=>t.id===tid);
    if (team) loadTeam(team);
    return;
  }

  // Verwijder team uit favorieten
  const rmFav = e.target.closest('[data-rmfav]');
  if (rmFav) {
    e.stopPropagation();
    e.preventDefault();
    removeFavTeam(rmFav.dataset.rmfav);
    renderFavDD();
    return;
  }

  // Tabs (op team-pagina)
  const tab = e.target.closest('.tab[data-pane]');
  if (tab) {
    tab.closest('.tabs').querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    tab.classList.add('on');
    document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
    const pane = document.getElementById(tab.dataset.pane);
    if (pane) pane.classList.add('on');
    return;
  }

  // data-action handlers
  const act = e.target.closest('[data-action]');
  if (act) {
    const a = act.dataset.action;
    if (a === 'home')              { renderHome(); return; }
    if (a === 'refresh-assoc')     { refreshAssoc(act.dataset.code, act.dataset.name); return; }
    if (a === 'refresh-team')      { refreshTeam(act.dataset.tid); return; }
    if (a === 'back-to-assoc')     { showAssocPage(act.dataset.code, act.dataset.name); return; }
    if (a === 'toggle-save-assoc') {
      const code = act.dataset.code;
      const name = act.dataset.name;
      const nowSaved = toggleSavedAssoc(code, name);
      act.classList.toggle('saved', nowSaved);
      act.textContent = nowSaved ? '✓ Opgeslagen' : '+ Opslaan';
      return;
    }
    if (a === 'toggle-fav-team') {
      const team = TR[act.dataset.tid] || getFavTeams().find(t=>t.id===act.dataset.tid);
      if (team) {
        const nowFav = toggleFavTeam(team);
        act.classList.toggle('saved', nowFav);
        act.textContent = nowFav ? '★ Favoriet' : '☆ Favoriet';
      }
      return;
    }
  }
});

(function() {
  // Wis alleen oude legacy keys
  try {
    ['vs_teams_v1','vs_assocs_v1','ss_v2','ss_v1','ss_teams_v1'].forEach(k => { try { localStorage.removeItem(k); } catch {} });
    Object.keys(localStorage).filter(k => k.startsWith('vs_c3_') || k.startsWith('vs_c2_') || k.startsWith('ssc_'))
      .forEach(k => { try { localStorage.removeItem(k); } catch {} });
  } catch {}

  // Cache TR met opgeslagen favorieten
  getFavTeams().forEach(t => { TR[t.id] = t; });

  updateFavCount();
  renderHome();
  loadClubsDB().then(() => {
    // Re-render home als zoekfeature pas nu beschikbaar wordt
    if (!getSavedAssocs().length) renderHome();
  });
})();
