        teams.map(t=>'<button class="picker-btn" data-tid="'+esc(t.id)+'"><div class="pb-type">'+esc(typeLabel(t.type))+'</div><div class="pb-name">'+esc(t.name)+'</div></button>').join('')+
      '</div></div>';
}

async function fetchAndShowTeams(code,clubName) {
  const myGen=++gen;
  const M=document.getElementById('M');
  M.innerHTML='<div class="nd" style="padding:60px"><span class="spin" style="font-size:1.5rem">⟳</span><br><br>Teams ophalen voor '+esc(code)+'…</div>';
  try {
    const url=EXPORT+'/vereniging/'+code.toUpperCase()+'/resultaten.rss';
    const xml=await fetchRSS(url);
    if(myGen!==gen)return;
    const items=parseRSS(xml);
    if(!items.length)throw new Error('Geen wedstrijden gevonden voor code '+code);

    // Bepaal welke teams bij deze club horen door te tellen hoe vaak
    // een teamnaam voorkomt. Eigen teams komen in elke wedstrijd voor
    // (~N keer), tegenstanders slechts 1-2 keer.
    const TYPE_RE = /\b(DS|HS|DA|DB|DC|DD|HA|HB|HC|HD|JA|JB|JC|MA|MB|MC|GEM)\s*(\d+)\b/i;
    
    // Tel elke volledige teamnaam
    const nameCounts = {};
    items.forEach(m=>{
      [m.thuis,m.uit].forEach(name=>{
        if(TYPE_RE.test(name)){
          nameCounts[name]=(nameCounts[name]||0)+1;
        }
      });
    });

    // Drempelwaarde: minimaal 20% van het aantal items, of minimaal 3
    const threshold = Math.max(3, Math.ceil(items.length * 0.2));
    const ownNames = Object.entries(nameCounts)
      .filter(([,cnt])=>cnt>=threshold)
      .map(([name])=>name);

    // Haal de club-naam op uit de meest voorkomende eigen naam
    let detectedClubName = clubName;
    if(!detectedClubName && ownNames.length){
      detectedClubName = ownNames[0].replace(TYPE_RE,'').trim();
    }

    // Bouw teamSet op uit eigen teams
    const teamSet={};
    ownNames.forEach(name=>{
      const match=name.match(TYPE_RE);
      if(!match)return;
      const rt=match[1].toUpperCase();const nr=+match[2];
      const type=rawTypeToApiType(rt);const k=type+'_'+nr;
      if(!teamSet[k]){
        const cn=name.replace(TYPE_RE,'').replace(/[-–\s]+$/,'').trim();
        teamSet[k]={type,nr,clubName:cn||detectedClubName||code};
      }
    });

    // Fallback als detectie mislukt
    if(!Object.keys(teamSet).length){
      ['dames','heren'].forEach(type=>{
        for(let nr=1;nr<=3;nr++)
          teamSet[type+'_'+nr]={type,nr,clubName:detectedClubName||code};
      });
    }

    const teams=Object.entries(teamSet).map(([,v])=>({
      id:teamId(code,v.type,v.nr),
      name:v.clubName+' '+typeLabel(v.type)+' '+v.nr,
      code:code.toUpperCase(),type:v.type,nr:v.nr
    })).sort((a,b)=>a.type.localeCompare(b.type)||a.nr-b.nr);

    teams.forEach(t=>TR[t.id]=t);
    if(myGen!==gen)return;
    showPicker(detectedClubName||code,code,teams);
  } catch(e) {
    if(myGen!==gen)return;
    M.innerHTML=
      '<div class="home-hero"><h2>Niet gevonden: '+esc(code)+'</h2>'+
      '<p>'+esc(e.message)+'</p>'+
      '<p style="margin-top:12px"><a href="https://www.volleybal.nl/competitie" target="_blank" style="color:var(--blue)">Zoek de juiste code op volleybal.nl →</a></p></div>';
  }
}

function loadAndSave(team) {
  const teams=getTeams();
  if(!teams.find(t=>t.id===team.id)){teams.push(team);saveTeams(teams);}
  loadTeam(team);
}

// ═══════════════════════════════════════════
//  TYPE HELPERS
// ═══════════════════════════════════════════
function rawTypeToApiType(r) {
  const m={
    'DS':'dames','HS':'heren',
    'DA':'meisjes-a','MA':'meiden-a',
    'DB':'meisjes-b','MB':'meiden-b',
    'DC':'meisjes-c','MC':'meiden-c',
    'DD':'meisjes-d','MD':'meiden-d',
    'HA':'jongens-a','JA':'jongens-a',
    'HB':'jongens-b','JB':'jongens-b',
    'HC':'jongens-c','JC':'jongens-c',
    'HD':'jongens-d','JD':'jongens-d',
    'GEM':'gemengd','XR':'mix-recreatief',
    'N1':'cmv-niveau-1','N2':'cmv-niveau-2','N3':'cmv-niveau-3','N4':'cmv-niveau-4',
    'L1':'volley-stars-level-1','L2':'volley-stars-level-2','L3':'volley-stars-level-3',
    'L4':'volley-stars-level-4','L5':'volley-stars-level-5',
  };
  return m[r.toUpperCase()] || r.toLowerCase();
}
// Strip teamtype en nummer van teamnaam
function clubNameFromTeam(name) {
  return name.replace(/\s+(DS|HS|DA|DB|DC|DD|HA|HB|HC|HD|JA|JB|JC|MA|MB|MC|MD|GEM|XR|N\d|L\d)\s*\d*\s*$/i,'').trim() || name;
}
function typeLabel(type) {
  const m={
    'dames':'DS','heren':'HS',
    'meisjes-a':'DA','meiden-a':'MA','meisjes-b':'DB','meiden-b':'MB',
    'meisjes-c':'DC','meiden-c':'MC','meisjes-d':'DD','meiden-d':'MD',
    'jongens-a':'JA','jongens-b':'JB','jongens-c':'JC','jongens-d':'JD',
    'gemengd':'GEM','mix-recreatief':'XR',
    'cmv-niveau-1':'N1','cmv-niveau-2':'N2','cmv-niveau-3':'N3','cmv-niveau-4':'N4',
    'volley-stars-level-1':'L1','volley-stars-level-2':'L2','volley-stars-level-3':'L3',
    'volley-stars-level-4':'L4','volley-stars-level-5':'L5',
  };
  return m[type] || type;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════════════
//  EVENT DELEGATION
// ═══════════════════════════════════════════
document.addEventListener('click',e=>{
  // Checkbox in vergelijkmodus — ALTIJD eerst checken, vóór tile-handler
  const ck = e.target.closest('.cmp-check[data-cid]');
  if (ck) {
    e.stopPropagation();
    if (!compareMode) return;
    const cid = ck.dataset.cid;
    if (compareIds.has(cid)) {
      compareIds.delete(cid);
      ck.classList.remove('checked');
      ck.textContent = '';
    } else if (compareIds.size < 4) {
      compareIds.add(cid);
      ck.classList.add('checked');
      ck.textContent = '✓';
    }
    updateCompareBar();
    return;
  }

  // ── Klik op bekende-associatie suggestie ──
  const asItem = e.target.closest('.as-item[data-acode]');
  if (asItem) {
    selectKnownAssoc(asItem.dataset.acode, asItem.dataset.aname);
    return;
  }

  // ── Verwijder team (MOET vóór tile-handler staan) ──
  const delBtn = e.target.closest('.del-team-btn[data-delid]');
  if (delBtn) {
    e.stopPropagation();
    e.preventDefault();
    const id = delBtn.dataset.delid;
    const teams = getTeams().filter(t => t.id !== id);
    saveTeams(teams);
    const t = TR[id];
    if (t) delCached(cacheKey(t.code, t.type, t.nr));
    renderHome();
    return;
  }

  // ── Verwijder hele vereniging ──
  const delAssocBtn = e.target.closest('.del-assoc-btn[data-delcode]');
  if (delAssocBtn) {
    e.stopPropagation();
    e.preventDefault();
    const code = delAssocBtn.dataset.delcode;
    const teams = getTeams().filter(t => t.code.toUpperCase() !== code.toUpperCase());
    saveTeams(teams);
    // Wis cache voor alle teams van deze vereniging
    Object.values(TR).filter(t => t.code.toUpperCase() === code.toUpperCase())
      .forEach(t => delCached(cacheKey(t.code, t.type, t.nr)));
    renderHome();
    return;
  }

  // Tile klikken in vergelijkmodus → toggle checkbox, niet navigeren
  const tile = e.target.closest('.team-tile[data-tid]');
  if (tile && compareMode) {
    const cid = tile.dataset.tid;
    const ck2 = tile.querySelector('.cmp-check');
    if (compareIds.has(cid)) {
      compareIds.delete(cid);
      ck2?.classList.remove('checked');
      if (ck2) ck2.textContent = '';
    } else if (compareIds.size < 4) {
      compareIds.add(cid);
      ck2?.classList.add('checked');
      if (ck2) ck2.textContent = '✓';
    }
    updateCompareBar();
    return;
  }

  // Opgeslagen team (suggestie of tile) — alleen buiten vergelijkmodus
  const siTid = e.target.closest('.si[data-tid],.team-tile[data-tid],.picker-btn[data-tid]');
  if (siTid) {
    SB.classList.remove('open');
    const id = siTid.dataset.tid;
    const team = TR[id] || getTeams().find(t => t.id === id);
    if (team) { TR[team.id] = team; loadTeam(team); }
    return;
  }
  // Club (suggestie of picker-btn)
  const siClub = e.target.closest('.si[data-club],.picker-btn[data-club]');
  if (siClub) { SB.classList.remove('open'); fetchAndShowTeams(siClub.dataset.club,''); return; }

  const saveBtn = e.target.closest('.ver-save-btn[data-stid]');
  if (saveBtn) {
    e.stopPropagation();
    const tid = saveBtn.dataset.stid;
    const team = TR[tid];
    if (team) {
      const teams = getTeams();
      if (!teams.find(t=>t.id===team.id)) { teams.push(team); saveTeams(teams); }
      saveBtn.textContent = '✓ Opgeslagen';
      saveBtn.style.color = 'var(--green)';
      saveBtn.style.borderColor = 'var(--green)';
      saveBtn.disabled = true;
    }
    return;
  }

  // Tabs
  const tab=e.target.closest('.tab[data-pane]');
  if(tab){
    tab.closest('.tabs').querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    tab.classList.add('on');
    document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
    const pane = document.getElementById(tab.dataset.pane);
    if (pane) pane.classList.add('on');
    // Lazy load vereniging tab on first click
    if (tab.dataset.pane === 'tv' && tab.dataset.loadclub) {
      const clubCode  = tab.dataset.loadclub;
      const clubLabel = tab.dataset.loadname || '';
      const paneEl = document.getElementById('tv');
      if (paneEl && paneEl.querySelector('.nd')) {
        loadVerenigingTab(clubCode, paneEl, clubLabel);
        delete tab.dataset.loadclub; // only load once
      }
    }
    return;
  }
  // cmpToggle knop
  const tog = e.target.closest('#cmpToggle');
  if (tog) {
    compareMode = !compareMode;
    compareIds.clear();
    const checks = document.querySelectorAll('.cmp-check');
    checks.forEach(ch => {
      ch.style.display = compareMode ? 'flex' : 'none';
      ch.classList.remove('checked');
      ch.textContent = '';
    });
    tog.textContent = compareMode ? '✕ Annuleren' : '⚖️ Vergelijken';
    removeCompareBar();
    return;
  }

  // data-action
  const act=e.target.closest('[data-action]');
  if(act){
    const a=act.dataset.action;
    if(a==='home'){initCompareMode();removeCompareBar();renderHome();return;}
    if(a==='addassoc'){showAddAssocPage();return;}
    if(a==='modal'){document.getElementById('OV').classList.add('open');return;}
    if(a==='modal-close'){document.getElementById('OV').classList.remove('open');return;}
    if(a==='modal-save'){saveManual();return;}
    if(a==='refresh'){refreshTeam(act.dataset.tid);return;}
  }
});

document.getElementById('OV').addEventListener('click',e=>{
  if(e.target===document.getElementById('OV'))document.getElementById('OV').classList.remove('open');
});

// ═══════════════════════════════════════════
//  MODAL SAVE
// ═══════════════════════════════════════════
function saveManual() {
  const name=document.getElementById('mN').value.trim();
  const code=document.getElementById('mC').value.trim().toUpperCase();
  const type=document.getElementById('mT').value;
  const nr=parseInt(document.getElementById('mNR').value)||1;
  if(!name||!code){alert('Vul naam en clubcode in.');return;}
  const team={id:teamId(code,type,nr),name,code,type,nr};
  TR[team.id]=team;
  document.getElementById('OV').classList.remove('open');
  loadAndSave(team);
}
